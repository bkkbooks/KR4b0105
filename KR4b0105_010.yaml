body:
  text: 卷十齊太祖高皇帝誄日月鬱華風雲黯色傷動紫微悲匝璇極嗚呼哀哉粵夏四月辛卯將遷座于泰安陵龍鑾既整羽衛以陳深酸舊物掩咽故臣嗣皇帝永訣丹掖叫號青墀攀神光之一絶慟遠邇之何期弓劍有慕纂德寫辭僉曰若稽古聖璿圖靈鏡星樞發祥電光啓命誕惟弱齡惠志聰情如金如璧爰秀爰英於鑠冠歲騰華流藝允文允武克明克睿聿尚登學嚴道尊師宣散五禮優游六詩上炫舊滯旁鏡前疑才罄艷采筆盡麗辭在友斯悌于親伊孝儉泰共色夷阻一貌遊情協矩縱心蹈教鄉術式慕州閭是效業優登仕先哲攸懋矧乃寥廓淵規邃構官府天地舟輿宇宙龍靜鳳戢斂奇掩秀昔在帝劉王室放命狡焉僞誕晦朔陵正鋒車北軼爟火南盛太祖時乘爰茲發迹塞井滅勳夷竈龕敵賞鏤王圖功蕤帝冊乃厲中葉天未斂難兵百袁曹禍十楚漢吳地前崩越壤首亂街號耀盛火列金斷聚甲如陵獻俘為觀北楚倔強曾未屈膝雲屯被野魚麗亘日廟勇既消國圖方匱神冊天開雄略世出凶劍鱗沈醜戈羽逸隻騎不返踦輪無匹厥庸戾止雜珮委他榮鬱閶闔寵重山河皇彝有文朝采方藹頻煩金紐左右緹蓋毗戎肅禁參輦侍旆譽馥區中道薆氓外河濟國險淮泗邦塵要藩重設匪賢則親亦既推軷擁土庇民聲稜絶俗威贍殊鄰宋主陵遐紫殿遏密話言之詔貽在英粹寅亮大寶敷綸妙祕世識機鑒物宗淵懿無敻匪練靡奧不洎三階既馴五精惟至彭蠡九江地盡襟製亦有劉範衣纓是絶躍馬山岫泛舟河澨縞鏑星流紅旗電結鴆翼競扇豺牙爭礪禍纏紫禁兵交丹衛瑤祀若旍金扆如綴朝野傾儀咸歸上德實賴至公瀉家提國懷險實泰襄危必克機簉朝旦功定曛黑妙物更配具章重則深居撝外遙棲綿默高秩方臻元禮有序王曰念哉輝寵是與職褒宮閣任卷文武飾華麗貂縈金疊組宏猷溢俗曾芬冠古憬彼朱方亦惟宗秩陰圖食昴潛謀貫日征輪未誓偏旗銜律原燎既寂世囂伊謐爰崇爰貴以望以實鴈縣告靜象郡無虞杳鬱遠域清麗瓊都國填氓負朝委事虛實翳哲相嶽曜神居功美既損道富去益再紐契訓重匡禹迹方同范張濯纓汾射散簪山郊解珮松石頳霞拂朝蒼煙懵夕韻屬玄經恩流金液靈厭霸德少帝告釁滅慈滅養抵仁抵信枉獄炎爐淫刑霜刃刲忠翦義樊稚斫櫬惵惵萬氓曰怨曰震妖霓將崩災裂昊蒼況乃鼎國資滌資匡臨朝闡命遏昏立綱事綿毗漢義締翼商既綏地職亦懋天工權輿典緯俾作司空黼黻雕戈祐宇升庸徒賜先袞爰永渥沖實曰驃騎卷迹辭功寰㝢睦政畿甸綸風沈氏滔天勃逆舊楚氣蹂黃池志轢柏舉裂禮紊度毀經棄序黑騎黟山朱旗赬渚短兵相接長鎩為群皓如海岸矗似蒸雲合乃霧激離則霰分荊國既軼郢縣方焚袁劉二戾猋馳煒發聯謀制外儲兵襲內釁激瓊殿勢崩金闕志乘玄璽圖矯祕鉞鴻妖逝星高祲棄月惟時諸侯上脫下競圖服淆蕩實綴仁聖輝耀國靈導揚主命曾規近晣深謨遠鏡左輪朱赭表裏斯定七德飾歌九功綷詠乃陟上鉉寵文方輝誕錫有秩綵吹旌旗贊政瑤光翊教太微實曰太傅爰登相國緝氓以禮綜祗以德景福咸湊芳猷允塞羽泳式造紘縣是則金湯無險軌書攸同迥迥寵迹窈窈睿功寶圭黛壤俾王于東絢冊是敷懋物既崇設業設虡丹懸碧鏞於穆顯相黎元時雍冰州炎徼來獻其賝鴈海龍關亦柔好音梁黿棧鼉越險浮深遠戎皆覲上靈必臨山吐石青野降蜜露瑞芝麗草珍柯爛樹人崩俗締玄緯幽數眷此妙德跂我王度簉滯炎旻既變至公萎蕤媯華太祖受終大宋有順高撝萬邦容豫慶雲遊衍南風正服寶位圓光玉繩御繡懷古負黼夙興丘礙必靜淵漪咸澄勛扆有作黔牗其義矜卑廣慈合賤兼愛綴機剟賊輕章削罰迹去繁奓情歸素一軒靡龍刻楹無丹密越賤申椒楚輟靈橘陵寢起邑池藻誰縣遙館罕御離房空薦惇教路宮淹神正殿斟酌信義左右律禮瑩彼皇維燁茲國體胄業既樹璧流方啓漢求金岫吳寶銅塹寧若睿德讓駟卻劍實才為貴唯功是念火職咸允雲官亦熙既皋乃益匪稷伊夔無觖巡風寧俟辨詩玉燭調文玄英最節乘山呈瑞航海歸闕不曠景冊靡空歲月受緯機衡兼甄書史孫韓各辨莊墨異理昭政往藹洗鑠前軌逍遙星斗徙倚涼雲春飆方舞秋鴻初分式謠式詠載績載文邈哉我后淪泳賢聖罄品作號盡物歸政蒼黎汰歡玄靈刷慶永戩嘉祉方寅景命締詳有文䫻沛將掩理昧人詖道懸世險敻略遺圖忌華徇儉文暗陳几翌明告漸蜆鷸鬭食日月朏精矧在乘輿宇拆宙傾祲纏鸞掖悲赴紫扃去璇臺之照襲珠殯之冥嗚呼哀哉帷宮低景輦路巇光惻柏門之黯黯泣松帳之茫茫上宮劈而詔御咽群后慕而侍衛傷攢靈既儼遠日以筮鬱鬯既奠龍酹已撤素月夜橫翠煙曉結摐虛金而下欷吟空簫而增絶嗚呼哀哉於是颯天駕而從綺輿澀神行而撫文輦傍建春而南蹕徑宣陽而東踐尚葐蒀而未散乍眇默而不轉睇千乘之共啜盼萬騎之相泫嗟魏后之戀譙惻漢主之懷沛辭金陵之𦷁義降雲陽之杳藹風奇響而駐軒煙異色而低旆怨街邑之綵驂弔原野之縞蓋挽夫愴而征馬凝痛縈盈其如帶嗚呼哀哉復林油雲重山減日御房清凄神路冥謐昭徒肅纛幽祗竦蹕攀光灑慟臨泉澍泗璪座長嚴雕宮永閟寂帳寂兮寂已遠夜釭夜兮夜何邃嗚呼哀哉宋故尚書左丞孫緬墓志文宋故尚書左丞孫緬墓志文光靈維周肇祀伊衛照分上代鏡華中世睿誕降明秀芳嗣烈學惟物範行實士節容與書林優遊史藝素巾峨冠朱紱纍轍來訪詩逸入詢禮缺麗名文質齊影儒哲慶履匪舒沴氣遽結殯帷兮既晦泉火兮已閉曖遺波於遙緒颯流馨於遠歲宋故安成王右常侍劉喬墓志文宋故安成王右常侍劉喬墓志文丹陽韞聖豐鄉降賢玉葉既積金徽方傳乃育伊人剋廣克宣騰芬中屬飛藻上年杳杳虛素永永沖關雲意霜柏瓊立冰堅家寶以瑩國才未甄參錯報善茫昧雲玄斂魂幽石委氣空山膚若流波身如絶煙芳菲一逝美懋徒鐫宋故銀青光祿大夫孫敻墓志文宋故銀青光祿大夫孫敻墓志文川祇效鏡嶽祥獻明碧葉獨秀瑤源自清幼炳器譽夙耀才名體兼遷雲學備儒史紫閣咸趨朱軒既履貴交慕塵素遊企軌騰藻上京振彩下國如彼緑蘭秉芬四塞欷人徑之不平歎天路之冥默貴夫君之為美播靈均與正則齊故御史中丞孫詵墓志文齊故御史中丞孫詵墓志文筠以霜藹蘭以風薰深哉若人實好斯文系緒承胄激花驚芬才基魏粲學參漢雲覽志上載洽鏡前聞騰名冠俗揚采絶群方協明世式贊睿君如何不淑天道離分敢雕窆石永晣幽墳齊故司徒右長史檀超墓志文齊故司徒右長史檀超墓志文惟金有詵惟玉有瑤君實淵哉行為世標高志灑落逸氣寂寥奧學內溢深文外昭嘉采籍譽登國振朝亦既有美筠傷蕙凋人邇運曠世促道遼永矣仁矣流芳無澆蕭驃騎祭石頭戰亡文咸告忠貞之魂曰義惟行首雄實士節嗟爾驍驚稟才蹈烈守玉不渝懷冰可折氣彰靡旗情皎亂轍高墉摧堅巨醜挫鋭深痛克矜冤靈及雪隆恩殊悼臨爾以欷千秋同盡百齡一世魂而有知咸無遠邇嗚呼哀哉蕭太傅東耕呪文蕭太傅東耕呪文敬呪先穡曰攝提方春黍稷未華灼爍發雲昭耀開霞地煦景曖山艷水波側聞農政實惟民天競秬獻歲務畎上年有淹踈潤興雨導泉崇耕巡索均逸共勞命彼倌人稅于青皋羽旗銜蕤雄戟耀毫呈典緇耦獻禮翠壇宜民宜稼克降祈年願靈之降解珮停鑾神之行兮氣為軷神之坐兮煙為蓋使嘉穀與玄鬯永爭光而無沫哉草木頌十五首並序草木頌十五首並序僕一命之微遭萬代之幸不能鐫心礪骨以報所事擢翼驤首自致丹梯爰乃恭承嘉惠守職閩中且僕生人之樂久已盡矣所愛兩株樹十莖草之間耳今所鑿處前峻山以蔽日後幽晦以多阻飢猿搜索石瀨戔戔庭中有故池水常決雖無魚梁釣臺處處可坐而葉饒冬榮花有夏色茲赤縣之東南乎何其奇異也結莖吐秀數千餘類心所憐者十有五族焉各為一頌以寫勞魂金荊江南之山疊障連天既抱紫霞亦漱絳煙金荊嘉樹涵露宅仙姱節詎及幽意誰傳相思竦枝碧澗臥根石林日月斷色霧雨恆陰緑秀八照丹實四臨公子不至山客徒尋豫章伊南有材匪桂匪椒下貫金壤上籠赤霄盤薄廣結捎瑟曾喬七年乃識非曰終朝本集栟櫚異木之生疑竹疑草攢叢石徑森蓯山道煙岫相珍雲壑共寶不華不縟可避工巧杉桐梓舊麗松栝稱奇焉如茲品獨秀青崖群木斂望雜草不窺長入煙氣永參鸞螭柳木貴冬榮柳實寒色停黛峰頂𢮿翠石側碧葉菴藹頳柯翕赩方陋筠檟遠笑荊棘楊梅寶跨荔枝芳軼木蘭懷蕊挺實涵英糅丹鏡日繡壑照霞綺巒為我羽翼委君玉盤山桃惟園有實惟山有叢丹花擎露紫榮繞風引霧如電映煙成虹伊春之秀乃華之宗山中石榴山中石榴美木艷樹誰望誰待縹葉翠萼紅華絳采照烈泉石芬披山海奇麗不移霜雪不改木蓮迸采泉壑騰光淵丘緗麗碧巘紅艷桂洲山人結侶靈俗共遊時至不採為子淹留石上菖蒲石上菖蒲藥實靈品爰乃輔性卻痾衛福蠲邪養正縹色外妍金光內映草經所珍仙圖是詠黃連黃連上草丹沙之次禦孽辟妖長靈久視驂龍行天馴鳳匝地鴻飛以儀順道則利薯蕷署預薯蕷華不可炫葉非足憐微根儻餌棄劍為仙黃金共鑄青雘爭妍君謂無妄我驗衡山杜若山中杜若嘉爾翠質不奇不俗載華載實同銜夕露共烘朝日夷險無二沈冥如一藿香桂以過烈麝以太芬摧阻天壽夭折人文詎及藿香微馥微薰攝靈百仞養氣青氛雲山讚四首並序壁上有雜畫皆作山水好勢仙者五六雲氣生焉悵然會意題為小讚云王太子王太子子喬好輕舉不待煉銀丹控鶴去窈窕學鳳對巑岏山無一春草谷有千年蘭雲衣不躑躅龍駕何時還陰長生陰君惜靈骨圭璧詎為寶日夜名山側果得金丹道憂傷永不至光顏如碧草若度西海時致意三青鳥白雲紫煙世不覿赤鱗庖所捐白雲亦海外葐蒀起三山蕭瑟玉池上容裔帝臺前欲知青都裏乘此乃登天秦女青琴既曠世緑珠亦絶群猶不及秦女十五乘綵雲璧質人不見瓊光俗詎聞願使洛靈往為我道奇芬雜三言五首並序雜三言五首並序豫上國不才黜為中山長史待罪三載究識煙霞之狀既對道書官又無職筆墨之勢聊為後文搆象臺曰上妙兮道之精道之精兮俗為名名可宗兮聖風立立聖風兮茲教生寫經記兮寄圖剎畫影象兮在丹青起淨法兮出西海流梵音兮至柬溟網紫宙兮洽萬品冠璇㝢兮濟群生余汩阻兮至南國迹已徂兮心未扃立孤臺兮山岫架半空兮江汀纍青杉於澗構積紅石於林櫺雲八重兮七色山十影兮九形金燈兮江蘺環軒兮匝池相思兮豫章戴雪兮抱霜栽異木而同秀種雜草而一香苔蘚生兮繞石戶蓮花舒兮繡池梁伊日月之寂寂無人音與馬迹耽禪情於雲徑守息心於端石永結意於鷲山長憔悴而不惜訪道經百學兮異文錦派兮綺分珍君之言兮皎無際悅子之道兮迥不群淡深韻於白水儼高意於浮雲軌賢豪於後學軼望識於前文茲道兮可傳可傳兮皓然挾茲心兮赴絶國懷此書兮坐空山空山隱轔兮窮翠崿水散漫兮涵素壑海外陰兮氣曇曇江上月兮光灼灼東南出兮是一山西北來兮乃雙鶴池中蓮兮十色紅窗前樹兮萬葉落四壁深兮乃泬㵳左右虛兮如寂寞寂寞兮山室德經兮道袠蕩魂兮刷氣掩憂兮靜疾信若人兮先覺聊與子兮如一鏡論語巡青史之殘誥覽朱管之遺冊惟魯濱之一叟信銜道而探寂世艱險而多阻君英明而不革講業兮齊衛論精兮洙泗子之說兮義已祕成賈鄭之雄理考黃何之壯思惜古人之取才瞰青雲而靖意意惆悵兮有端才嶒峻兮可觀憲媯禹而折法襲仁誼而求安不嬿婉於戚施寧踸踔於馬蘭俾後生之庶士鑒明德之音翰惟山中兮寂寞沉憂思兮無從石紅青兮百疊山濃淡兮萬重日下兮月出兮銅峰竹色兮拂戶水氣兮繞窗味哲人之遺珍折片句兮忘老嘉石門之埋名憐柳子之沈道書吳伯於衣袖鏤顏子於心抱籌出處之叔仲酌言默之多少若妙行與上靈非積學之所紹至游夏以升降幸砥心而勿夭悅曲池北山兮黛柏南江兮頳石頳峰兮若虹黛樹兮如畫暮雲兮十里朝霞兮千尺千尺兮綿綿青氣兮往旋桐之葉兮蔽日桂之枝兮刺天百谷多兮瀉亂波雜澗饒兮騖叢泉竟長洲兮匝東島縈曲嶼兮繞西山山巒岏兮水環合水環合兮石重沓林中電兮雨冥冥江上風兮木颯颯盟清泠兮適潺湲白雲起兮弔石蓮客子思兮心斷絶心斷絶兮愁無間步東池兮夜未艾臥西窗兮月向山引一息於魂內擾百緒於眼前意春蘭與秋若願不絶於江邊愛遠山伯鸞兮已遠名山兮不返逮紺草之可結及朱華之未晚緤余馬於椒阿漾余舟於沙衍臨星朏兮樹暗看日爍兮霞淺淺霞兮駮雲一合兮一分映壑兮為飾綴澗兮成文碧色兮婉轉丹秀兮葐蒀深林寂以窈窈上猿狖之所群群猿兮聒山大林兮蔽天楓岫兮筠嶺蘭畹兮芝田紫蒲兮光水紅荷兮艷泉香枝兮嫩葉翡纍兮翠疊非郢路之遼遠實寸憂之相接欷美人於心底願山與川之可涉若溘死於汀潭哀時命而自愜應謝主簿騷體山櫺靜兮悲凝涼澗軒掩兮酒涵霜曾風激兮緑蘋斷積石閉兮紫苔傷芝原寂少色筠庭黯無光沐豫冠於極浦馳豫珮兮江陽弔秋冬之已暮憂與憂兮不忘使杜蘅可翦而棄夫何貴於芬芳劉僕射東山集學騷含秋一顧眇然山中檀欒循石便娟來風木瑟瑟兮氣芬蒀石戔戔兮水成文擲江崖之素草窺海岫之青雲願芙蓉兮未晦遵江波兮待君山中楚辭五首山中楚辭六五首青春素景兮白日出之藹藹吾將弭節於江夏見杜若之始大結雕鱗以成車懸雜羽而為蓋草色緑而馬聲悲欷沿袖以流帶豫將禮於太一乃雄劍兮玉鉤日華粲於芳閣月金披於翠樓舞燕趙之上色激河淇之名謳薦西海之異品傾東嶽之庶羞乘文魚兮錦質要靈人兮中洲入橘浦兮容與心惝惘兮迷所識視煙霞而一色深秋窈以虧天上列星之所極桂之生兮山之巒紛可愛兮柯團團溪崎嶬兮石架阻䬀䬟颼兮木道寒煙色閉兮喬木撓嵐氣暗兮幽篁難忌蟪蛄之蚤吟惜王孫之晚還信於邑兮白露夭天病兮秋蘭石𥱰𥱰兮蔽泉雪疊疊兮薄樹車蕭條兮山徑舟容與兮水路愍晨夜之摧挫感春秋之欲暮征夫輟而在位御者局而載顧魂兮歸來異方不可以親蝮蛇九首雄虺戴鱗炎穴一光骨爛魂傷玄狐曳尾赤象為梁至日歸來無往此異方自序自序淹字文通濟陽考城人幼傳家業六歲能屬詩十三而孤邈過庭之訓長遂博覽群書不事章句之學頗留精於文章所誦詠者蓋二十萬言而愛奇尚異深沉有遠識常慕司馬長卿梁伯鸞之徒然未能悉行也所與神遊者唯陳留袁叔明而已弱冠以五經授宋始安王劉子真略傳大義為南徐州新安王從事奉朝請始安之薨也建平王劉景素聞風而悅待以布衣之禮然少年嘗倜儻不俗或為世士所嫉遂誣淹以受金者將及抵罪乃上書見意而免焉尋舉南徐州桂陽王秀才對策上第轉巴陵王左常侍右軍建平王主簿賓待纍年雅以文章見遇而宋末多阻宗室有憂生之難王初欲羽檄徵天下兵以求一旦之幸淹嘗從容曉諫言人事之成敗每曰殿下不求宗廟之安如信左右之計則復見麋鹿霜棲露宿於姑蘇之臺矣終不以納而更疑焉及王移鎮朱方也又為鎮軍參事領東海郡丞於是王與不逞之徒日夜搆議淹知禍機之將發又賦詩十五首略明性命之理因以為諷王遂不悟乃憑怒而黜之為建安吳興令地在東南嶠外閩越之舊境也爰有碧水丹山珍木靈草皆淹平生所至愛不覺行路之遠矣山中無事與道書為偶乃悠然獨往或日夕忘歸放浪之際頗著文章自娛在邑三載朱方竟敗焉復還京師值世道已昏守志間居不交當軸之士俄皇帝始有大功於四海聞而訪召之為尚書駕部郎驃騎竟陵公參軍事當沈攸之起兵西楚也人懷危懼高帝嘗顧而問之曰天下紛紛若是君謂如何淹對曰昔項強而劉弱袁衆而曹寡羽號令諸侯竟受一劍之辱紹跨躡四州終為奔北之虜此所謂在德不在鼎公何疑焉帝曰聞此言者多矣其試為我言之淹曰公雄武有奇略一勝也寬容而仁恕二勝也賢能畢力三勝也民望所歸四勝也奉天子而伐逆叛五勝也攸之志鋭而器小一敗也有威而無恩二敗也士卒解體三敗也搢紳不懷四敗也懸兵數千里而無同惡相濟五敗也故豺狼十萬而終為我獲焉帝笑曰君談過矣是時軍書表記皆為草具逮東霸城府猶掌筆翰相府始置仍為記室參軍事及讓齊王九錫備物及諸文表皆淹為之受禪之後又為驃騎豫章王記室參軍鎮東武令參掌詔冊並典國史既非雅好辭不獲命尋遷正員散騎侍郎中書侍郎淹嘗云人生當適性為樂安能精意苦力求身後之名哉故自少及長未嘗著書惟集十卷謂如此足矣重以學不為人交不苟合又深信天竺緣果之文偏好老氏清淨之術仕所望不過諸卿二千石有耕織伏臘之資則隱矣常願幽居築宇絶棄人事苑以丹林池以緑水左倚郊甸右帶瀛澤青春爰謝則接武平皋素秋澄景則獨酌虛室侍姬三四趙女數人不則逍遙經紀彈琴詠詩朝露幾間忽忘老之將至淹之所學盡此而已矣
