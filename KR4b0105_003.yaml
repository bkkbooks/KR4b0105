body:
  text: 卷三侍始安王石頭緒官承盛世逢恩侍英王結劍從深景撫袖逐曾光暮情鬱無已流望在川陽平原忽超遠參差見南湘何如塞北陰雲鴻盡來翔攬鏡照愁色徒坐引憂方山中如未夕無使桂葉傷本集三詩紀七十五從征虜始安王道中秉笏從帷幕仄身豫休明君子未獲晏小人亦自營結軒首涼野驅馬傃寒城容裔還鄉棹逶迤去國旌山氣亘百里山色與雲平喬松日夜竦紅霞旦夕生徒慚恩厚概空抱春施名仰願光威遠歲晏返柴荊本集三詩紀七十五貽袁常侍昔我別楚水秋月麗秋天今君客吳坂春色縹春泉幽冀生碧草沅湘含翠煙鑠鑠霧上景懵懵雲外山涉江竟何望留滯空採蓮駐情光氣下凝怨琴瑟前珠貝性明潤蘭玉好芳堅不以宿昔岨懷愧期暮年本集三詩紀七十五又類聚二十九文苑英華二百四十七並引天泉煙山蓮五韻就謝主簿宿季月寒氣重滋蘭錯無芳北風漂夜色河凝皓如霜悵哉心神晚燭滅此深堂菱衣如可贈寧濕岨雲梁本集三詩紀七十五銅爵妓武王去金閣英威長寂寞雄劍頓無光雜佩亦銷爍秋至明月圓風傷白露落清夜何湛湛孤燭映蘭幕撫影愴無從惟懷憂不薄瑤色行應罷紅芳幾為樂徒登歌舞臺終成螻蟻郭本集三樂府詩集三十一詩紀七十五學魏文帝西北有浮雲繚繞華陰山惜哉時不遇入夜值霜寒秋風聒地起吹我至幽燕幽燕非我國窈窕為誰賢少年歌且止歌聲斷客子本集三詩紀七十六從冠軍行建平王登廬山香爐峰從冠軍行建平王登廬山香爐峰廣成愛神鼎淮南好丹經此峰具鸞鶴往來盡仙靈瑤草正翕赩玉樹信蔥青絳氣下縈薄白雲上杳冥中坐瞰蜿虹俯伏視流星不尋遐怪極則知耳目驚日落長沙渚曾陰萬里生藉蘭素多意臨風默含情方學柏松隱羞逐市井名幸承光誦末伏恩託後旌本集三文選二十二廬山記四廬山紀事四詩紀七十五又類聚七引冥星生情四韻望荊山奉義至江漢始知楚塞長南關繞桐柏西途出魯陽寒郊無留影秋日懸清光悲風撓重林雲霞肅川漲歲晏君如何零淚染衣裳玉柱空掩露金樽坐含霜一聞苦寒奏再使艷歌傷本集三文選二十七詩紀七十五又類聚七引長陽光漲裳五韻步桐臺客子畏霜雪憂至竟悠哉綺帷生網羅寶刀積塵埃思君出漢北鞍馬登楚臺歲綵合雲光平原秋色來寂聽積空意凝望信長懷蕙芬自有美光景詎徘徊山中忽緩駕暮雪將盈階本集三詩紀七十五從建平王遊紀南城從建平王遊紀南城恭承此嘉德末官至南荊斂衽依光采端笏奉仁明再逢緑草合重見翠雲生江甸知禮富漢渚聞教清君王淡以思樹羽望楚城年積衣劍滅地遠宮館平錦帳終寂寞綵瑟祕音英丹沙信難學黃金不可成遷化每如茲安用貴空名流宕慘中懷凝意方自驚願借若木景長照憂人情本集三詩紀七十五又類聚六十三引荊明生清城平六韻秋至懷歸悵然集漢北還望岨山田沄沄百重壑參差萬里山楚關帶秦隴荊雲冠長煙草色斂窮水木葉變吳川秋至帝子降客人傷嬋娟試訪淮海使歸路成數千蓬驅未止極旌心徒自懸若華想無慰憂至定傷年本集三詩紀七十五古意報袁功曹從軍出隴北長望陰山雲涇渭各流異恩情於此分故人贈寶劍鏤以瑤華文一言鳳獨立再説鸞無群何得晨風起悠哉凌翠氛黃鵠去千里垂涕為報君本集三樂府三十二廣文選十五詩紀七十五渡西塞望江上諸山南國多異山雜樹共冬榮潺湲夕澗急嘈囋晨鵾鳴石林上參錯流沫下縱橫松氣鑑青藹霞光鑠丹英望古一凝思留滯桂枝情結友愛遠嶽採藥好長生常畏佳人晚秋蘭傷紫莖海外果可學歲暮誦仙經本集三詩紀七十五劉僕射東山集蕭蕭雲色滋惟愛起長思喬木嘯山曲征鳥怨水湄共惜玉樽暮願使光陰遲紳裳視絶雲銜意方此時誦飾江皋駕終從海濱詩本集三詩紀七十五寄丘三公昔我學冠劍逢君在三川何意風雨激一訣異東西菊秀空應奪蘭芳幾時堅常恐握手畢黯如光絶天安得明月珠攬涕寄吳山本集三詩紀七十五陸東海譙山集杳杳長役思思來使情濃恆忌光氛度藉蕙望春紅青莎被海月朱華冒水松輕氣曖長嶽雄虹赫遠峰日暮崦嵫谷參差綵雲重永願白沙渚遊衍遂相從丹山有琴瑟不為憂傷容本集三詩紀七十五燈夜和殷長史冬盡綵葉暮金石亦懷傷冰鱗不能起水鳥望川梁客子依永夜寂寞幽意長臥歇丹丘采坐失曾泉光結眉慘成慮銷憂非羽觴此心冀可緩清芷在沅湘本集三詩紀七十五贈煉丹法和殷長史琴高遊會稽靈變竟不還不還有長意長意希童顏身識本爛熳光曜不可攀方驗參同契金竈煉神丹頓捨心知愛永卻平生歡玉牒裁可卷蕊珠不盈簞譬如明月色流采映歲寒一待黃冶就青芬遲孤鸞本集三詩紀七十五感春冰遙和謝中書二首江皋桐始華斂衣望邊亭平原何寂寂島暮蘭紫莖芬披好草合流爛新光生冰雪徒皎潔此焉空守貞本集三詩紀七十五暮意歌上春悵哉望佳人攬洲之宿莽命為瑤桂因觀書術不變學古道恆真若作商山客寄謝丹水濱本集三詩紀七十五無錫縣歷山集無錫縣歷山集愁生白露日怨起秋風年竊悲杜蘅暮攬涕弔空山落葉下楚水別鶴噪吳田瘴氣陰不極日色半虧天酒至情蕭瑟憑樽還惘然一聞清琴奏歔泣方留連況乃客子念直置絲竹間本集三詩紀七十五又類聚七引年山田天然五韻無錫舅相送銜啼別無錫舅相送御帝銜啼別心遠路已迥意滿辭未陳曾風漂別蓋北雲竦征人杯酒憐歲暮志氣非上春若無孤鳥還瀝泣何所因本集三詩紀七十五吳中禮石佛幻生太浮詭長思多沉疑疑思不慚照詭生寧盡時敬承積劫下金光鑠海湄火宅斂焚炭藥草匝惠滋常願樂此道誦經空山坻禪心暮不雜寂行好無私軒騎久已訣親愛不留遲憂傷漫漫情靈意終不緇誓尋青蓮果永入梵庭期本集三詩紀七十五赤亭渚吳江泛丘墟饒桂復多楓水夕潮波黑日暮精氣紅路長寒光盡鳥鳴秋草窮瑤水雖未合珠霜竊過中坐識物序晏臥視歲陰空一傷千里極獨望淮海風遠心何所類雲邊有征鴻本集三詩紀七十五渡泉嶠出諸山之頂岑崟蔽日月左右信艱哉萬壑共馳騖百谷爭往來鷹隼既厲翼蛟魚亦曝鰓崩壁迭枕臥嶄石屢盤回伏波未能鑿樓船不敢開百年積流水千歲生青苔行行詎半景余馬以長懷南方天炎火魂兮可歸來本集三詩紀七十五遷陽亭遷陽亭攬淚訪亭候茲地乃閩城萬古通漢使千載連吳兵瑤澗敻嶄崒銅山鬱縱橫方水埋金雘圓岸伏丹瓊下視雄虹照俯看綵霞明桂枝空命折煙氣坐自驚劍徑羞前檢岷山慚舊名伊我從霜露僕御復孤征楚客心命絶一願聞越聲本集三詩紀七十五採石上菖蒲採石上菖蒲瓊琴久塵蕪金鏡廢不看不見空閨裏縱橫愁思端緩步遵汀渚揚枻泛波瀾竇至煙水流緑緩桂涵丹憑酒意未悅半景方自歎每為憂見及杜若詎能寬冀採石上草得以駐餘顏赤鯉儻可乘雲霧不復還本集三初學記二十文苑英華三百二十七詩紀七十五又類聚八十一引看端瀾丹歎寬顏七韻遊黃蘗山遊黃蘖蘗山長望竟何極閩雲連越邊南州饒奇怪赤縣多靈仙金峰各虧日銅石共臨天陽岫照鸞采陰溪噴龍泉殘屼千代木牆崒萬古煙禽鳴丹壁上猿嘯青崖間秦皇慕隱淪漢武願長年皆負雄豪威棄劍為名山況我葵藿志松木橫眼前所若同遠好臨風載悠然本集三詩紀七十五又類聚七引邊仙天泉問五韻還故國還故國漢臣泣長沙楚客悲辰陽古今雖不舉茲理亦宜傷山中信寂寥孤景吟空堂北地三變露南簷再逢霜竊值寰海闢仄見圭緯昌浮雲抱山川遊子銜故鄉遽發桃花渚適宿春風場紅草涵電色緑樹鑠煙光高歌傃關國微歎依笙篁請學碧靈草終歲自芬芳本集三詩紀七十五傷內弟劉常侍金璧自蕙質蘭杜信嘉名丹綵既騰迹華萼故揚聲伊余方罷秀歎息向君榮誰疑春光昃何遽秋露輕遠心惜近路促景怨長情風至衣袖冷況復蟪蛄鳴白露沿漢照明月空漢生長悲離短意惻切吟空庭注欷東郊外流涕北山坰本集四詩紀七十六從蕭驃騎新亭壘從蕭驃騎新帝亭壘鯢妖毀王度虹氣岨王猷上宰軫靈略宏威肅廣謀綿嶮冒戈堞乘嶠架烽樓燕兵歌越水代馬思吳州金笳夜一遠明月信悠悠雲色被江出煙光帶海浮開襟夾蒼宇拓遠局溟洲折日承丹谷總駕臨青丘仄待颷霧晏方從畎壑遊本集三詩紀七十五效阮公詩十五首歲暮懷感傷中夕弄清琴戾戾曙風急團團明月陰孤雲出北山宿鳥驚東林誰謂人道廣憂慨自相尋寧知霜雪後獨見松竹心本集三類聚二十六詩紀七十六十年學讀書顏華尚美好不逐世間人鬭雞東郊道富貴如浮雲金玉不為寶一旦鵜鴂鳴嚴霜被徑草志氣多感失泣下沾懷抱同上白露淹庭樹秋風吹羅衣忠信主不合辭意將訴誰獨坐東軒下雞鳴夜已晞總駕命賓僕遵路起旋歸天命誰能見人蹤信可疑本集三詩紀七十六飄飄恍惚中是非安所之大道常不驗金火每如斯慷慨少淑貌便娟多令辭宿昔秉心誓靈明將見期願從丹丘駕長弄華池滋同上陰陽不可知鬼神惟杳冥暫試武帝貌一見李后靈同情淪異物有體入無形賢聖共草昧仁智焉足明變化未有極恍惚誰能精同上若木出海外本自丹水陰群帝共上下鸞鳥相追尋千齡猶旦夕萬世更浮沉豈與異鄉士瑜瑕論淺深同上夏后乘兩龍高會在帝臺榮光河雒出白雲蒼梧來侍御多賢聖升降有群才四時有變化盛明不徘徊高陽邈已遠佇立誰語哉本集三廣文選十五詩紀七十六昔余登大梁西南望洪河時寒原野曠風急霜露多仲冬正慘切日月少精華落葉縱橫起飛鳥時相過搔首廣川陰懷歸思如何常願反初服間步潁水阿同上宵明輝西極女娃映東海佳麗多異色芬葩有奇采綺縞非無情光陰命誰待不與風雨變長共山川在人道則不然消散隨風改本集三詩紀七十六少年學擊劍從師至幽州燕趙兵馬地唯見古時丘登城望山水平原獨悠悠寒暑有往來功名安可留同上擾擾當途子毀譽多埃塵朝生輿馬間夕死衢路濱藜藿應見棄勢位乃為親華屋爭結綬朱門競彈巾徒羡草木利不愛金碧身至德所以貴河上有丈人同上華樹曜北林芬芳空自宣秋至白雲起蟪蛄號庭前中心有所思虛堂獨浩然安坐詠琴瑟逍遙可永年同上假乘試行遊北望高山岑翩翩征鳥翼蕭蕭松柏陰感時多辛酸覽物更傷心性命有定理禍福不可禁唯見雲際鵠江海自追尋同上夕雲映西山蟋蟀吟桑梓零露被百草秋風吹桃李君子懷苦心感慨不能止駕言遠行遊驅馬清河涘寒暑更進退金石有終始光色俯仰間英艷難久恃同上至人貴無為裁魂守寂寥唯有馳騖士風塵在一朝輿馬相跨躍賓從共矜驕天道好盈缺春華故秋凋不知北山民商歌美場苗同上清思詩五首趙后未至麗陰妃非美極情理儻可論形有焉足識帝女在河洲晦映西海側陰陽無定光雜錯千萬色終歲如瓊草紅華長翕赩本集三詩紀七十六師曠操雅操延子聆奇音玄鶴徒翔舞清角自浮沉明琯東南逝精絲西北臨白雲瑤池曲上使淚淫淫同上秋夜紫蘭生湛湛明月光偃蹇靈芝采容裔紫華堂林木不拂蓋淇水寧漸裳倏忽南江陰照曜北海陽從此長往來萬世無感傷同上白露滋金瑟清風蕩玉琴空閨饒遠念虛堂生夜陰茲夕一何哀明月沒西林世人重時暮道士情亦深願乘青鳥翼徑出玉山岑同上至德不可傳靈龜不可侶草木還根蒂精靈歸妙理我學杳冥道誰能測窮已須待九轉成終會長沙市同上
