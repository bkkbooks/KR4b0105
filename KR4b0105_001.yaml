body:
  text: 卷一恨賦試望平原蔓草縈骨拱木斂魂人生到此天道寧論於是僕本恨人心驚不已直念古者伏恨而死假如秦帝按劍諸侯西馳削平天下同文共規華山為城紫淵為池雄圖既溢武力未畢方架黿鼉以為梁巡海右以送日一旦魂斷宮車晚出若乃趙王既虜遷於房陵薄暮心動昧旦神興別豔姬與美女喪金輿及玉乘置酒欲飲悲來填膺千秋萬歲為恨難勝至如李君降北名辱身冤拔劍擊柱弔影慚魂情往上郡心存鴈門裂帛繫書誓還漢恩朝露溘至握手何言若夫明妃去時仰天太息紫臺稍遠關山無極搖風忽起白日西匿隴鴈少飛代雲寡色望君王兮何期終蕪絶兮異域至乃敬通見抵罷歸田里閉關卻掃塞門不仕左對孺人顧弄稚子脫略公卿跌宕文史齎志沒地長懷無已及夫中散下獄神氣激揚濁醪夕引素琴晨張秋日蕭索浮雲無光鬱青霞之奇意入修夜之不暘或有孤臣危涕孽子墜心遷客海上流戍隴陰此人但聞悲風䫻起泣下霑襟亦復含酸茹歎銷落湮沉若乃騎疊迹車屯軌黃塵匝地歌吹四起無不煙斷火絶閉骨泉裏已矣哉春草暮兮秋風驚秋風罷兮春草生綺羅畢兮池館盡琴瑟滅兮丘壟平自古皆有死莫不飲恨而吞聲文選十六去故鄉賦日色暮兮隱吳山之丘墟北風析兮絳花落流水散兮翠茿疏愛桂枝而不見悵浮雲而離居乃凌大壑越滄淵沄沄積崚水橫斷山窮陰匝海平蕪帶天於是泣故關之已盡傷故國之無際出汀州而解冠入漵浦而捐袂聽蒹葭之蕭瑟知霜露之流滯對江皋而自憂弔海濱而傷歲撫尺書而無悅倚樽酒而不持去室宇而遠客遵蘆葦以為期情嬋娟而未罷愁爛漫而方滋切趙瑟以橫涕吟燕笳而坐悲少歌曰芳洲之草行欲暮桂水之波不可渡絶世獨立兮報君子之一顧是時霜翦蕙兮風摧芷平原晚兮黃雲起寧歸骨於松柏不買名於城市若濟河無梁兮沉此心於千里重曰江南之杜蘅兮色以陳願使黃鵠兮報佳人橫羽觴而淹望撫玉琴兮何親瞻層山而蔽日流餘涕以沾巾恐高臺之易晏與螻蟻而為塵藝文類聚三十倡婦自悲賦並序漢有其録而亡其文泣蕙草之飄落憐佳人之埋暮乃為辭焉粵自趙東來舞漢宮瑤序金陳桂枝嬌風素壁翠樓明月徒秋歌聲忽散傷人復愁君王更衣露色未晞侍青鑾以雲聳夾丹輦以霞飛願南山之無隙指壽陵以同歸俄而緑衣坐奪白華臥進屑骨不憐擅金誰吝九重已關高門自蕪青苔積兮銀閣澀網羅生兮玉梯虛度九冬而廓處遙十秋以分居傷營魂之已盡畏松柏之無餘歸故鄉之末光實夫君之晚滋去柏梁以掩袂出桂苑而斂眉視朱殿以再暮撫嬪華而一疑於是怨帝關之遂岨悵平原之何極霜繞衣而葭冷風飄輪而景昃御思趙而不顧馬懷燕而未息泣遠山之異峰望浮雲之雜色若使明鏡前兮碎孤鴈之錦翼乃為詩曰曲臺歌未徙黃壤哭已親玉玦歸無色羅衣會成塵驕才雄力君何怨徒念薄命之苦辛藝文類聚三十二哀千里賦蕭蕭江陰兮荊山之岑北繞琅琊碣石南馳九疑桂林山則異嶺奇峰橫嶼帶江雜樹億尺紅霞萬重水則遠天相逼浮雲共色沄沄無底溶溶不測其中險如孟門豁若長河參差巨石縱橫龜鼉若乃夏后未鑿秦皇未闢嶄岩生岸迤𨓦成迹馳湍走浪漂沙擊石伊孟冬之初立出首夏以歸來自出國而辭友永懷慕而抱哀魂終朝以三奪心一夜而九摧徒望悲其何及銘此恨於黃埃於時鴻鴈既鳴秋光亦窮水黯黯兮蓮葉動山蒼蒼兮樹色紅思雲車兮沅北望霓裳兮澧東惜重華之已沒念芳草之坐空既而悄愴成憂憫默自憐信規行之未曠知矩步之已難雖河北之爽塏猶橘柚之不遷及年歲之未晏願匡坐於霸山青苔賦並序余鑿山楹為室有苔焉意之所之故為是作云嗟青苔之依依兮無色類而可方必居間而就寂以幽意之深傷故其處石則松栝交陰泉雨長注絶澗俯視崩壁仰顧悲凹嶮兮唯流水而馳騖遂能崎屈上生班駮下布異人貴其貞精道士悅其迥趣咀松屑以高想捧丹經而永慕若其在水則鏡帶湖沼錦匝池林春塘秀色陽鳥好音青郊未謝兮白日照路貫千里兮緑草深乃生水而搖蕩遂出波而沉淫假青條兮總翠借黃花兮舒金遊梁之客徒馬疲而不能去兔園之女雖蠶飢而不自禁至於修臺廣廡幽閣間楹流黃以織琴瑟且鳴戶牖祕兮不可見履袂動兮覺人聲乃蕪階翠地繞壁點墻春禽悲兮蘭莖紫秋蟲吟兮蕙實黃晝遙遙而不暮夜永永以空長零露下兮在梧楸有美一人兮欷以傷若乃崩隍十仞毀冢萬年當其志力雄俊才圖驕堅錦衣被地鞍馬耀天淇上相送江南採蓮妖童出鄭美女生燕而頓死豔氣於一旦埋玉玦於窮泉寂兮如何苔積網羅視青蘪之杳杳痛百代兮恨多故其所詣必感所感必哀哀以情起感以怨來魂慮斷絶精念徘徊者也彼木蘭與豫章既中繩而獲夭及薜荔與蘪蕪又懷芬而見表至哉青苔之無用吾孰知其多少藝文類聚八十二初學記二十七石劫賦並序海人有食石劫一名紫𧄤蚌蛤類也春而發華有足異者戲書為短賦我海若之小臣具品色於滄溟既爐天而銅物亦翕化而染靈比文豹而無恤方珠蛤而自寧冀湖濤之蔽迹願洲渚以淪形故其所巡左委羽右窮髮日照水而東升山出波而隱沒光避伏而不耀智埋冥而難發何弱命之不禁遂永至於夭閼已矣哉請去海人之仄陋充公子之嘉客儻委身於玉盤從風雨而可惜藝文類聚九十七水上神女賦江上丈人遊宦荊吳首衛國望燕途歷秦關出宋都遍覽下蔡之女具悅淇上之姝未有粉白黛黑鬼神之所無也乃造南中渡炎洲徑玉澗越金流路逶迤而無軌野忽漭而鮮儔山反覆而參錯水澆灌而縈薄石五采而橫峰雲千色而承萼日炯炯而舒光雨屑屑而稍落紫莖繞徑始參差紅荷緣水才灼爍忽而精飛視亂意走心移綺靡菱蓋悵望蕙枝一麗女兮碧渚之崖曖曖也非雲非霧如煙如霞諸光諸色雜卉雜華的的也象圭象璧若虛若實綾錦共文瑤貝合質遂乃紅唇寫朱真眉學月美目艷起秀色爛發窈窕暫見偃蹇還沒冶異絶俗奇麗不常青琴羞艷素女慚光笑李后於漢主恥西施於越王神翻覆而愈悅志離合而感傷女遂俯整玉軼仰肅金鑣或採丹葉或拾翠條守明璣而為誓解琅玕而相要情乍合而還散色半親而復嬌聳軿車於水際停雲霓於山椒奄人祗之仿像共光氣而寂寥於時也綵霞繞繞卿雲縵縵石瓊文而翕赩山龍鱗而照爛苔緑根而攢集草紅葩而舒散日炫晃以朧光樹葳蕤而蔥粲無西海之浩蕩見若木之千尋非丹山之赫曦聞琴瑟之空音理洞徹於俗聽物驚怪於世心恨精影之不滯悼光晷之難惜閲有無於俄頃驗變化於咫尺視空同而失貌察倏忽而亡迹野田田而虛翠水湛湛而空碧乃唱桂棹凌衝波背橘浦向椒阿硉矹木石洪漭蛟鼉顧御僕而情饒巡左右而怨多弔石渚而一欷悵沙洲而少歌苟懸天兮有命永離決兮若何退以為妙聲無形奇色非質麗於嬪嬙精於琴瑟尋漢女而空佩觀清角而無匹嬪楊不足聞知夔牙焉能委悉何如明月之忌玄雲秋露之慚白日愁知形有之留滯非英靈之所要術也藝文類聚七十九泣賦秋日之光流兮以傷霧離披而殺草風清泠而繞堂視左右而不臑具衣冠而自涼默而登高谷坐景山倚桐柏對石泉直視百里處處秋煙闃寂以思情緒留連江之永矣蓮欲紅南有喬木葉以窮心蒙蒙兮恍惚魄漫漫兮西東詠河兗之故俗眷徐楊之遺風眷徐楊兮阻關梁詠河兗兮路未央道尺折而寸斷魂十逝而九傷欷潺湲兮沫袖泣嗚唈兮染裳若夫景公齊山荊卿燕市孟嘗聞琴馬遷廢史少卿悼躬夷甫傷子皆泣緒如絲詎能仰視鏡終古而若斯況余輩情之所使哉御覽四百八十八待罪江南思北歸賦待罪江南思北歸賦伊小人之薄伎奉君子而輸力接河漢之雄才攬日月之英色絶雲氣而厲響負青天而撫翼德被命而不渝恩潤身而無極何規矩之守任信愚陋而不肖愧金碧之琳琅慚丹雘之照曜樊天網而自離徒夜分而誰弔遭大道之隆盛雖草木而勿履誤銜造於遠國出顛沛之願始去三輔之臺殿辭五都之城市惟江南兮丘墟遙萬里兮長蕪帶封狐兮比景連雄虺兮蒼梧當青春而離散方仲冬而遂徂寒蒹葭於余馬傷霧露於農夫跨金峰與翠巒涉桂水與碧湍雲清泠而多緒風蕭條而無端猿之吟兮日光迥狖之啼兮月色寒究煙霞之繚繞具林石之巑岏於是臨虹霓以築室鑿山楹以為柱上皓皓以臨月下淫淫而愁雨奔水潦於遠谷汩木石於深嶼鷹隼戰而櫓巢黿鼉怖而穴處若季冬之嚴月風搖木而騷屑玄雲合而為凍黃煙起而成雪虎踡局而斂步蛟躨跜而失穴至江蘺兮始秀或杜衡兮初滋桂含香兮作葉藕生蓮兮吐絲俯金波兮百丈見碧沙兮來往霧葐蒀兮半出雲雜錯兮飛上石照爛兮各色峰近遠兮異象及回風之搖蕙天潭潭而下露木蕭梢而可哀草林離而欲暮夜燈光之寥迥歷隱憂而不去心湯湯而誰告魄寂寂而何語情枯稿而不反神翻覆而亡據夫以雄才不世之主猶儲精於沛鄉奇略獨出之君尚婉戀於樊陽潘去洛而掩涕陸出吳而增傷況北州之賤士為炎土之流人共魍魎而相偶與蠨蛸而為鄰秋露下兮點劍舄青苔生兮綴衣巾步庭廡兮多蒿棘顧左右兮絶親賓憂而填骨思兮亂神願歸靈於上國雖坎軻而不惜身藝文類聚二十七別賦黯然銷魂者唯別而已矣況秦吳兮絶國復燕宋兮千里或春苔兮始生乍秋風兮暫起是以行子腸斷百感悽惻風蕭蕭而異響雲漫漫而奇色舟凝滯於水濱車逶迤於山側棹容與而詎前馬寒鳴而不息掩金觴而誰御橫玉柱而沾軾居人愁臥恍若有亡日下壁而沉彩月上軒而飛光見紅蘭之受露望青楸之罹霜巡層楹而空掩撫錦幕以虛涼知離夢之躑躅意別魂之飛揚故別雖一緒事乃萬族至若龍馬銀鞍朱軒繡軸帳飲東都送客金谷琴羽張兮簫鼓陳燕趙歌兮傷美人珠與玉兮艷暮秋羅與綺兮嬌上春驚駟馬之仰秣聳淵魚之赤鱗造分手而銜涕各寂寞而傷神乃有劍客慚恩少年報士韓國趙廁吳宮燕市割慈忍愛離邦去里瀝泣共訣抆血相視驅征馬而不顧見行塵之時起方銜感於一劍非買價於泉裏金石震而色變骨肉悲而心死或乃邊郡未和負羽從軍遼水無極鴈山參雲閨中風暖陌上草薰日出天而耀景露下地而騰文鏡朱塵之照爛襲青氣之煙熅攀桃李兮不忍別送愛子兮沾羅裙至如一赴絶國詎相見期視喬木兮故里訣北梁兮永辭顧左右兮魄動視親賓兮淚滋可班荊兮增恨唯樽酒兮敘悲值秋鴈兮飛日當白露兮下時怨復怨兮遠山曲去復去兮長河湄又若君居淄右妾家河陽同瓊珮之晨照共金爐之夕香君結綬兮千里惜瑤草之徒芳慚幽宮之琴瑟晦高臺之流黃春閨閟此青苔色秋帳含茲明月光夏簟青兮晝不暮冬釭凝兮夜何長織錦曲兮泣已盡回文詩兮影獨傷儻有華陰上士服食還仙術既妙而猶學道已寂而未傳守丹竈而不顧鍊金鼎而方堅駕鶴上漢驂鸞騰天暫遊萬里少別千年惟世間兮重別謝主人兮依然下有芍藥之詩佳人之歌桑中衛女上宮陳娥春草碧色春水淥波送君南浦傷如之何至乃秋露如珠秋月如圭明月白露光陰往來與子之別思心徘徊是以別方不定別理千名有別必怨有怨必盈使人意奪神駭心折骨驚雖淵雲之墨妙嚴樂之筆精金閨之諸彥蘭臺之群英賦有凌雲之稱辨有雕龍之聲詎能摹暫離之狀寫永訣之情者乎文選十六藝文類聚三十蓮華賦並序蓮華賦並序余有蓮華一池愛之如金宇宙之麗難息絶氣聊書竹素儻不滅焉撿水陸之具品閲山海之異名珍爾秀之不定乃天地之精英殖東國之流詠出西極而擅名方翠羽而結葉比碧石而為莖蕊金光而絶色藕冰拆而玉清載紅蓮以吐秀披絳華以舒英故香氛感俗淑氣參靈躑躅人世茵蒀祇冥青桂羞烈沉水慚馨於是生乎澤陂出乎江陰見綵霞之夕照覿雕雲之晝臨既翕赩於洲漲亦映曖於川潯奪夜月及熒光掩朝日與赩火出金沙而延曜被淥波而覃拖冠百草而絶群出異類之衆夥故仙聖傳圖英隱流記一為道珍二為世瑞發青蓮於王宮驗奇花於陸地若其江淡澤芬則照電爍日池光沼緑則明壁洞室曜長洲而瓊文映青崖而火質或憑天淵之清峭或殖疏圃之蒙密故河北棹歌之姝江南採菱之女春水厲兮楫潺湲秋風駃兮舟容與著縹芰兮出波攬緗蓮兮映渚迎佳人兮北燕送上客兮南楚知荷華之將晏惜玉手之空佇乃為謠曰秋鴈度兮芳草殘琴柱急兮江上寒願一見兮道我意千里遠兮長路難若其華實各名根葉異辭既號芙蕖亦曰澤芝麗詠楚賦艷歌陳詩非獨瑞草爰兼上藥味靈丹沙氣驗青雘乃可棄劍海岫龍舉雲崿畫臺殿兮霞蔚圖縑縞兮炳爍永含靈於洲渚長不絶兮川壑藝文類聚八十二丹沙可學賦並序丹沙可學賦並序咸曰金不可鑄僕不信也試為此辭精思云爾惟雲場之少折乃人徑之多憂雖瑤笙及金瑟雜翠帳與丹幬吞悲欣於得失銜哀樂於春秋煥如星絶黯如火滅星絶難光火滅可傷故從師而問道冀幽路之或暘測神宗之無緩踐雲根之不賒訊名山及石室驗青澒與丹沙撝五難之重滯攬九仙之輕華故抱魄寂處凝神空居泯邈深晝窈鬱重虛覘炫耀而可見聽泬寥而有餘於是乘河漢之光氣騎列星之綵色輟陰陽於形有傳變化於心識浮恍惚而無涯泛靈怪而未極架日月之精照騫蛟龍之毛翼遂乃氣穆肅而神奔骨窈窈而鬼怪綴葳蕤而成冠點雜錯而為珮出湎泣而遐鶩貫濛鴻而上厲鳳之來兮蔽日鸞之集兮為群左昆吾之炎景右崦嵫之卿雲爛七采之照耀漫五色之絪縕非世俗之質見焉鬼神之嘗聞既而曖碧臺之錯落耀金宮之瓏玲幻蓮華於繡闥化蒲桃於錦屏赩丹光而電烻颯翠氛而杳冥軒惝惘於冤虹階侘傺於奔鯨惑龍宮之殿稱迷忉利之宮名故靈偃蹇兮姣服女嬋娟兮可觀秀青色之泯靡熳美目之波瀾襞日月之纂組襲星宿之羅紈百味酒兮靈之集河供鯉兮靈之安卻交甫之玉質笑陳王之妙顏所以樂精玄於太一妙宮徵於清都簫含聲而遠近琴吐音而有無奏神鼓於玉袂舞靈衣於金裾韻躑躅而易變律參差而難圖非南風之能擬詎濮水之可摹於是流漾不一遨曹無邊蛾眉既散鍾鼓都捐乘綵霞於西海駟行雨於丹淵山差池而鏡壑水清明而抱天山含玉以永歲水藏圭以窮年擬若木以寫意拾瑤草而悠然遂乃凝虛斂一守仙閉方智寂術盡魄兀心亡白生不能關其説惠子無以挫其芒原其恥市朝之失道疾讒嬖之不祥卻文綵之淫冶去利劍之鏗鎗懅生死於半氣惜百年於一光故以鑄金為器丹沙為漿慚吝既盡妖怨當忘吾師以為可學而公子謂之不良歟藝文類聚七十八靈丘竹賦靈丘竹賦登崎嶇之碧巘入朱宮之瓏玲臨曲江之回蕩望南山之蔥青鬱春華於石岸赩夏彩於沙汀遠亘紫林祕野近匝玉苑禁坰於是緑筠繞岫翠篁綿嶺參差黛色陸離紺影上謐謐而留間下微微而停靖蒙朱霞之丹氣曖白日之素景故非英非蕊非香非馥而珍跨仙草寶踰靈木夾池水而檀欒繞園塘而橚矗既間霜而無凋亦中暑而增肅每冠名於華戎將擅奇於水陸況有朝雲之館行雨之宮窗崢嶸而緑色戶踟蹰而臨空綺疏蔽而停日朱簾開而留風被箘簬之窈蔚結篠簜之溟濛或産鳷鵲之右或居露寒之東此皆金輿之所出入瑤輦之所周通初學記二十八
