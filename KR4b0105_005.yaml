body:
  text: 卷五袁友人傳袁友人傳友人袁炳字叔明陳郡陽夏人其人天下之士幼有異才學無不覽文章俶儻清澹出一時任心觀書不為章句之學其篤行則信義惠和意罄如也常念蔭松柏詠詩書志氣跌宕不與俗人交俛眉暫仕歷國常侍員外郎府功曹臨湘令粟之入者悉散以贍親其為節也如此數百年未有此人焉至乃好妙賞文獨絕於世也又撰晉史奇功未遂不幸卒官春秋二十有八與余有青雲之交非直銜盃酒而已嗟乎斯才也斯命也天之報施善人何如哉何如哉報袁叔明書僕知之矣高皋為別執手未期浮雲色曉悵然魂飛前辱贈書知命僕息心越地採藥稽山友人幸甚去歲迫名茂才冬盡不獲有報引領於邑情詎可及足下推僕者不一二談也僕聞狂士之行有三竊嘗志之其奇者則以紫天為宇環海為池倮身大笑被髮行歌其次則堅坐崩岸僵臥深窟朝飡松屑夜誦仙經其下則辭榮城市退耕巖谷塞逕絕賓杜牆不出然者皆羞為西山之餓夫東國之黜臣而況其鄉黨乎或有社稷之士入而忘歸則爭論南宮之前衛主於邪伏身北闕之下納君於治至乃一說之奇驚畏左右一劍之功震慄鄰國夫能者唯橫議漢庭怒髮燕路且猶不數而況於鄰里乎若僕之行止已無可言矣材不肖文質無所直徒以結髮游學備聞士大夫言曰在國忠處家孝取與廉交友義故拂衣於梁齊之館抗手於楚趙之門且十年矣容貌不能動人智謀不足自遠竟慚君子之恩卒離飢寒之禍近親不言左右莫教涼秋陰陰獨立閑館輕塵入戶飛鳥無迹命保琴書而守妻子其可得哉故國史小官也而子長為之執戟下位也而子雲居之僕非有輕車驃騎之略交河雲險之功幸以盜竊文史之末因循卜祝之間故俛首求衣歛眉寄食耳若十口之隸去於飢寒從疾舊里斥歸故鄉箕坐高視舉酒極望雖五侯交書群公走幣僕亦在南山之南矣此可為智者道難與俗士言也方今仲秋風飛平原彯色水鳥立於孤洲蒼葭變於河曲寂然淵視憂心辭矣獨念賢明蚤世英華殂落僕亦何人以堪久長一旦松柏被地墳壟刺天何時復能銜杯酒者乎忽忽若狂願足下自愛也與交友論隱書淹者海濱窟穴弋釣為伍自度非奇力異才不足聞見於諸侯每承梁伯鸞臥於會稽之墅高伯達坐於華陰之山心常慕之而未能及也嘗感子路之言不拜官而仕無青組紫紱龜紐虎符之志但欲史曆巫卜為世俗賤事耳而彯然十載竟不免衣食之敗何則性有所短不可韋絃者有五一則體本疲緩臥不肯起二則人間應脩酷嬾作書三則賓客相對口不能言四則性甚畏動事絕不行五則愚婞妄發輒被口語有五短而無一長豈可處人間耶知短而不可易者所謂輪椎分定也猶如雞鶩之有毛不能得鸞鳳之光采矣況今年已三十白髮雜生長夜輾轉亂憂非一以溘至之命如星殞天促光半路不攀長意徒自欺取筋駑髓冷殊多災恙心頑質堅偏好冥默既信神農服食之言久固天竺道士之說守清淨煉神丹心甚愛之行善業度一世意甚美之今但願拾薇藿誦詩書樂天理性歛骨折步不踐過失之地耳猶以妻孥未奪桃李須陰望在五畝之宅半頃之田鳥赴簷上水匝階下則請從此隱長謝故人若乃登峨嵋度流沙餐金石讀仙經嘗聞其驗非今日之所言也誰謂難知青鳥明之貴布筆墨然亦焉足道哉奏記詣南徐州新安王伏惟明公殿下列譽椒壁飛聲沖漢爰求儒雅傍招異人削赤野之玉翦燕山之金至如淹者東國之徒步耳方歛影逃形匡坐編蓬之下遂遭煙露餘彩日月末光惟恩知泰變色薰心淹聞齊右既撫無待巴人之唱柏臺已搆寧俟不才之木淹幼乏鄉曲之譽長匱芹藻之德豈宜炫璞鄭氏獻鳳楚門哉願避職吏緩其召書到主簿日事詣右軍建平王到主簿日事詣右軍建平王淹乃庸人素非奇士既慚鄒魯儒生之德又謝燕趙俠客之節徒以結髮衛次暫聞仁義常欲永辭冠劍弋釣畎壑而身輕恩重猥奉末光枉白璧之惠降黑貂之私因茲感激未能自反負金羇於淮吳從後車於河楚竟不能曜丹雘騰英聲絕白雲負蒼梧至可知矣不謂咸池再暉瑤光重照開高天之慈布厚地之施承命以驚巡走且失淹聞古人為報常有意焉至乃一說之效齊王動色一劍之感趙王解衣孤心迥概有殞自天被黜為吳興令辭牋詣建平王被黜為吳興令辭牋詣建平王淹本遷徙之徒非有儒墨之能亦以轉命溝間待殯巖下誤得步脩榥循高軒伏層檻坐曲池承翠河之潤降璇日之光載筆奉后盛飾立朝於山東百姓亦已殊甚雖蓐螻蟻抵黃泉不足以塞惠而小人狼狽為鬼為蜮山淵所容衣劍不貸黥赭幽圄皆非報責仰遭大道之行草木勿踐輟鑊歛火吹魂拾骨濯以河漢之流曝以秋陽之景叢然黔首豈不戴天竊思伏皂九載齒錄八年以春以秋且思且顧竟不能抑黑質揚赤文抽精膽報慈光而自為擁腫之異木卒成踴躍之妖金所謂孽由己作匪降自天猶沐造化餘靈宥以遐邑方蒙被霜露裹糧洲島鑿山楹為室永與黿鼉為群猶蹶者不忘起盲者不忘視況罪溢朔方尚駐一等之刑咎過朱崖猶緩再重之施金石無知何以識荅昔河濟荊吳必獲陪從京輔關轂長奉帷席德音在耳話言如昨淹乃梁昌自投東極晨鳥不飛遷骨何日一辭城濠旦夕就遠白雲在天山川間之眷然西顧涕下若屑詣建平王上書詣建平王上書昔者賤臣叩心飛霜擊於燕地庶女告天振風襲於齊臺下官每讀其書未嘗不廢卷流涕何者士有一定之論女有不易之行信而見疑貞而為戮是以壯夫義士伏死而不顧者以此也下官聞仁不可恃善不可依謂徒虛語乃今知之伏願大王暫停左右少加矜察下官本蓬戶桑樞之人布衣韋帶之士退不飾詩書以驚愚進不買名聲於天下日者謬得升降承明之闕出入金華之殿何嘗不局影凝嚴側身扃禁者乎竊慕大王之義復為門下之賓備鳴盜淺術之餘豫三五賤伎之末大王惠以恩光顧以顏色寔佩荊卿黃金之賜竊感豫讓國士之分矣嘗欲結纓伏劍少謝萬一剖心摩踵以報所天不圖小人固陋坐貽謗缺迹墜昭憲身限幽圄履影弔心酸鼻痛骨下官聞虧名為辱虧形次之是以每一念來忽若有遺加以涉旬月迫季秋天光沉陰左右無色身非木石與獄吏為伍此少卿所以仰天搥心泣盡而繼之以血者也下官雖乏鄉曲之譽然嘗聞君子之行矣其上則隱於簾肆之間臥於巖石之下次則結綬金馬之庭高議雲臺之上次則虜南越之君係單于之頸俱啟丹冊並圖青史寧爭分寸之末競錐刀之利哉下官聞積毀銷金積讒磨骨遠則直生取疑於盜金近則伯魚被名於不義彼之二才猶或如是況在下官焉能自免昔上將之恥絳侯幽獄名臣之羞史遷下室至如下官當何言哉夫以魯連之智辭祿而不反接輿之賢行歌而忘歸子陵閉關於東越仲蔚杜門於西秦亦良可知也若使下官事非其虛罪得其實亦當鉗口吞舌伏匕首以殞身何以見齊魯奇節之人燕趙悲歌之士乎方今聖歷欽明天下樂業青雲浮洛榮光塞河西洎臨洮狄道北距飛狐陽原莫不浸仁沐義昭景飲醴而下官抱痛圓門含憤獄戶一物之微有足悲者仰惟大王少垂明白則梧丘之魂不愧於沉首鵠亭之鬼無恨於灰骨不任肝膽之切敬因執事以聞文選三十九梁書江淹傳南史五十九藝文類聚五十八到功曹參軍牋詣驃騎竟陵王到功曹參軍牋詣驃騎竟陵王竊惟明使君鉞下道耀神源德鑄靈極誕涵天聽資河炤聖譽拂紘外芳激震中故衡梁孕秀璿機流品變瑤光之暉贊玉燭之色功邁翊殷績起匡漢是以赤瑕瓊寶之文睇影而敻集青龍遺風之乘希光而遠至如民者蓋不足筭所志不出繒販所學不遺祝筮業異儒墨行乖曾史既乏脩短之術又慚啟塞之辨不能伏軾蹲衡驚燕趙之郊黃金橫帶馳淄澠之幣語默罕緒圓方靡樹謬以一氣之微邀百載之會躬奉英睿身蒙青雘故以潤厚累璧恩重兼金不悟懸黎降景靈河瀉潤復獲執羈蘭陳迎笏桂序漏越之琴竊莊文之價缺齧之劍盜頃襄之名心羞秦媵志慮楚犢抱魄踊躍憂集如熏鐫感何日銘報焉期拜正員外郎表臣邁鄉遠迹由學末徒不瑩彫龍之采寧照玄豹之飾自過被光私濫蒙恩幸屢度經冬亟移春序皇緯如紐慚飛塵之效璿基方峻謝寒露之勤故宜伏影軒間卷氣衡下猶蒙供事紫楹奉役丹殿巡魄擎概榮渥不悟震離徹邃阿景洞幽復昇官清閨列版嚴闥蕞識何筭爰忝叔則之仕菲質焉樹乃謬仲容之職猥枉青雘增光空質心懅末塵情慚洞戶佇首矯迹以銘以奏拜中書郎表拜中書郎表榮鬱兩臨恩儆交鏡悄然攬魂乃懼乃逝臣聞汝潁之金或揚采於四豪江淮之珠已馳光於七貴皆聲不妄美第豈虛立未有伎慚美輿蒙送目之賞工謝綵輪竊歸風之價臣幼乏篆刻長睽圖史智罕效官志闋從政方遽求振風長憂凌雨不悟遭社鳴之世屬河清之會玄雲素霞必駕蓬萊白毳騂鱗咸蒙解遂仕通物任官登郎掾此實耀靈之私照而微臣之厚幸也仰惟皇衢大融氣品呈觀西傾棧山東鯷航海故奇士端威異人罄折皆相望北闕待詔南宮而臣學無利博文有忮害乃彯裾頓屣伏黃扉之右曳纓轉笏居青璅之前訪德於姑射聞道於崆峒伊臣之願過為信矣昔望都才麗爵乏上班長岑聞靡身終下秩愚臣方古悠然已泰內燭徘徊眇不識屆
