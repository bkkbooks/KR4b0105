body:
  text: 卷四惜晚春應劉秘書煙景抱空意衡杜綴幽心心憂望碧葉涵影顧青林風光多樹色露華翻蕙陰水苔方下蔓石蘿日上尋霞衣已具帶仙冠不持簪徒為多委鬱精魄還自臨始獲瓊歌贈一點重如金山中有雜桂玉瀝乃共斟本集四詩紀七十五臥疾怨別劉長史臥疾怨別劉長史四時煎日夜玉露催紫榮始懷未迴歎春意秋方驚涼草散螢色夏樹歛蟬聲憑景魂且謐臥堂怨已生承君客江潭先愁鴻鴈鳴吳山饒離袂楚水多別情金堅碧不滅桂華蘭有英無輟代上朝豈惜鏡中明但見一葉落哀恨方始平本集四詩紀七十五又類聚二十九引榮騖聲鳴情英平七韻應劉豫章別清塵播嶠岫遠被修代高行乃厲天俗態攬明懋散才賢裂分堯甸於時秋永永江漢起殘煙獵獵風剪樹颯颯露傷蓮霞出海中雲水發江上泉浸淫泉懷浦泛濫雲辭山洲渚一揚袂殞意元氣前願效卷施草春華冬復堅本集四詩紀七十五秋夕納涼奉和刑獄舅蕭條晚秋景旻雲承景斜虛堂起青靄崦嵫生暮霞空居寂以欷左右自幽歌騎星謝箕尾濯髮慚陽阿年歇玄圃璧歲減天津波金簫哀夜長瑤琴怨暮多四時通信黯春風日夜過楚水徒有蘭憂至竟如何本集四詩紀七十五採菱曲採菱曲秋日心容與涉水望碧蓮紫菱亦可採試以緩愁年參差萬葉下泛漾百流前高彩隘通壑香氣麗廣川歌出櫂女曲儛入江南絃乘黿非逐俗駕鯉乃懷仙眾美信如此無恨出清泉本集四樂府詩集五十一詩紀七十五又類聚八十二引蓮年前川弦五韻郊外望秋荅殷博士白露掩江皋青滿平地蕪長夜亦何際銜思久踟躕企余重蘭貝清才富金瑜獨艷始東山擅麗終西都雲精無永滯水碧豈暫濡屬我嵫景半賞爾若光初折麻異離群紉蕙非索居頻贈既雅歌還懷諒短書本集四詩紀七十五冬盡難離和丘長史冬盡難離知和丘長史閑居深悵悵颸寒拂中閨寶禮自千里縑書果君題山川吐幽氣雲景抱長懷茲別亦為遠潮瀾鬱東西汀皋日慘色桂闇猿方啼攬意誰侘傺屑涕在心乖杜蘅念無沫石蘭終不暌冀揔歲暮駕遊衍蒼山蹊本集四詩紀七十五外兵舅夜集丹林一葉舊碧草從此空煙光拂夜色華舟盪秋風斂意悵何已極望情思中瑤瀾寂以晏若采能幾終暮心亦誰寄江皋桂有叢本集四詩紀七十五當春四韻同左丞雷萌山中草雲煦江上花流烟漾璇景輕風泛凌霞我有幽蘭念銜意矚里斜友人殊未還獨慰簷前華本集四詩紀七十五池上酬劉記室戚戚憂可結結憂視春暮紫荷漸曲池皋蘭覆徑路葱蒨亘華堂葐蒀雜綺樹為此久佇立容易光陰度水館次夕羽山葉下暝露懷賞入舊襟悅物攬新賦惜我無彫文報章慚復素本集四詩紀七十五雜體三十首並序雜體三十首並序夫楚謠漢風既非一骨魏製晉造固亦二體譬猶藍朱成彩雜錯之變無窮宮角為音靡曼之態不極故娥眉詎同貌而俱動於魄芳草寧共氣而皆悅於魂不其然歟至於世之諸賢各滯所迷莫不論甘則忌辛好丹則非素豈所謂通方廣恕好遠兼愛者哉乃及公幹仲宣之論家有曲直安仁士衡之評人立矯抗況復殊於此者乎又貴遠賤近人之常情重耳輕目俗之恆蔽是以邯鄲託曲於李奇士季假論於嗣宗此其效也然五言之興諒非敻古但關西鄴下既以罕同河外江南頗為異法故玄黃經緯之辨金碧浮沉之殊僕以為亦各具美兼善而已今作三十首詩斅其文體雖不足品藻淵流庶亦無乖商攉云爾本集四文選三十一詩紀七十六初學記二十一古離別古離別遠與君別者乃至鴈門關黃雲蔽千里遊子何時還送君如昨日簷前露已團不惜蕙草晚所悲道里寒君行在天涯妾身長別離願一見顏色不異瓊樹枝兔絲及水萍所寄終不移本集四文選三十一玉臺新詠五類聚二十九樂府詩集七十一廣文選十詩紀七十六李都尉從軍陵少卿樽酒送征人踟躕在親宴日暮浮雲滋握手淚如霰悠悠清川水嘉魴得所薦而我在萬里結友不相見袖中有短書願寄雙飛鷰本集四文選三十一樂府詩集三十二廣文選十詩紀七十六班婕妤詠扇紈扇如圜月出自機中素畫作秦王女乘鸞向煙霧彩色世所重雖新不似故竊愁涼風至吹我玉階樹君子恩未畢零落在中路本集四文選三十一玉臺新詠五作班婕妤樂府詩集四十二詩紀七十六又類聚四十一引素霧樹路四韻魏文帝遊宴丕子桓置酒坐飛閣逍遙臨華池神飆自遠至左右芙蓉披綠竹夾清水秋蘭被幽崖月出照園中冠珮相追隨客從南楚來為我吹參差淵魚猶伏浦聽者未云罷高文一何綺小儒安足為肅肅廣殿陰雀聲愁北林眾賓還城邑何用慰我心本集四文選三十一御覽五百九十二樂府詩集三十六廣文選八詩紀七十六陳思王贈友植子建君王禮英賢不吝千金璧雙闕指馳道朱宮羅第宅從容冰井臺清池映華薄涼風盪芳氣碧樹先秋落朝與佳人期日夕望青閣褰裳摘明珠徙倚拾蕙若眷我二三子辭義麗金雘延陵輕寶劍季布重然諾處富不忘貧有道在葵藿本集四文選三十一詩紀七十六劉文學感遇楨公幹劉文學感懷遇楨公幹蒼蒼山中桂團團霜露色霜露一何緊桂枝生自直橘柚在南國因君為羽翼謬蒙聖主私託身文墨職丹綵既已過敢不自雕飾華月照芳池列坐金殿側微臣固受賜鴻恩良未測本集四文選三十一廣文選九詩紀七十六又草堂詩箋十二夏夜歎注引一句王侍中懷德粲仲宣伊昔值世亂秣馬辭帝京既傷蔓草別方知杕杜情崤函蕩丘墟冀闕緬縱橫倚棹泛涇渭日暮山河清蟋蟀依素野嚴風吹枯莖鸛鷁在幽草客子淚已零去鄉三十載幸遭天下平賢主降嘉賞金貂服玄纓侍宴出河曲飛蓋遊鄴城朝露竟幾何忽如水上萍君子篤恩義柯葉終不傾福履既所綏千載垂令名本集四文選三十一廣文選九詩紀七十六嵇中散言志康叔夜曰余不師訓潛志去俗塵遠想出宏域高步超常倫靈鳳振羽儀戢景西海濱朝食琅玕實夕飲玉池津處順故無累養德乃入神曠哉宇宙惠雲羅更四陳哲人貴識義大雅明庇身莊生悟無為老氏守其真天下皆得一名實久相賓咸池饗爰居鐘鼓或愁辛柳惠善直道孫登庶知人寫懷良未遠感贈以書紳本集四文選三十一廣文選八詩紀七十六阮步兵詠懷籍嗣宗青鳥海上遊鸒斯蒿下飛浮沉不相宜羽翼各有歸飄飄可終年滉瀁安是非朝雲乘變化光耀世所希精衛銜木石誰能測幽微本集四文選三十一詩紀七十六張司空離情華茂先秋月映簾櫳懸光入丹墀佳人撫鳴琴清夜守空帷蘭徑少行迹玉臺生網絲庭樹發紅彩閨草含碧滋延佇整綾綺萬里贈所思願垂湛露惠信我皎日期本集四文選三十一玉臺新詠五詩紀七十六潘黃門述哀岳安仁潘黃門述哀岳安仁青春速天機素秋馳白日美人歸重泉悽愴無終畢殯宮已肅清松柏轉蕭瑟俯仰不能弭尋念非但一撫襟悼寂寞恍然若有失明月入綺牕髣髴想蕙質銷憂非萱草永懷寄夢寐夢寐復冥冥何由覿爾形我慚北海術爾無帝女靈駕言出遠山徘徊泣松銘雨絕無還雲華落豈留英日月方代序寢興何時平本集四文選三十一詩紀七十六陸平原羈宦機士衡儲后降嘉命恩紀被微身明發眷桑梓永歎懷密親流念辭南澨銜怨別西津驅馬遵淮泗旦夕見梁陳服義追上列矯迹廁宮臣朱黻咸髦士長纓皆俊民契闊承華內綢繆踰歲年日暮聊總駕逍遙觀洛川殂歿多拱木宿草凌寒煙遊子易感慨躑躅還自憐願言寄三鳥離思非徒然同上左記室詠史思太沖韓公淪賣藥梅生隱市門百年信荏苒何為苦心魂當學衛霍將建功在河源珪組賢君眄青紫明主恩終軍才始達賈誼位方尊金張服貂冕許史乘華軒王侯貴片議公卿重一言太平多懽娛飛蓋東都門顧念張仲蔚蓬蒿滿中園同上張黃門苦雨協景陽丹霞蔽陽景綠泉涌陰渚水鸛巢層甍山雲潤柱礎有渰興春節愁霖貫秋序燮燮涼葉奪戾戾颸風舉高談翫四時索居慕儔侶青苕日夜黃芳蕤成宿楚歲暮百慮交無以慰延佇本集四文選三十一詩紀七十六又白帖引一句劉太尉傷亂琨越石皇晉遘陽九天下橫氛霧秦趙值薄蝕幽并逢虎據伊余荷寵靈感激徇馳騖雖無六奇術冀與張韓遇甯戚扣角歌桓公遭乃舉荀息冒嶮難實以忠貞故空令日月逝愧無古人度飲馬出城濠北望沙漠路千里何蕭條白日隱寒樹投袂既憤懣撫枕懷百慮功名惜未立玄髮已改素時哉苟有會治亂惟冥數本集四文選三十一詩紀七十六盧侍郎感交諶子諒盧侍郎感交諶子諒大廈須異材廊廟非庸器英俊著世功多士濟斯位眷顧成綢繆乃與時髦匹姻媾久不虧契闊豈但一逢厄既已同處危非所恤常慕先達概觀古論得失馬服為趙將疆場得清謐信陵佩魏印秦兵不敢出慨無握中策徒慚素絲質羈旅去舊京感遇踰琴瑟自顧非杞梓勉力在無逸更以畏友朋濫吹乖名實同上郭弘農遊仙璞景純崦山多靈草海濱饒奇石偃蹇尋青雲隱淪駐精魄道人讀丹經方士煉玉液朱霞入牕牖曜靈照空隙傲倪摘木芝凌波採水碧眇然萬里遊矯掌望煙客永得安期術豈愁濛汜迫同上孫廷尉雜述楚子荊孫廷評尉雜述楚子荊太素既已分吹萬著形兆寂動苟有源因謂殤子夭道喪涉千載津梁誰能了思乘扶搖翰卓然凌風矯靜觀尺棰義理足未嘗少冏冏秋月明憑軒詠堯老浪迹無蚩妍然後君子道領略歸一致南山有綺皓交臂久變化傳火乃薪草亹亹玄思清胸中去機巧物我俱忘懷可以狎鷗鳥同上許徵君自敘詢玄度張子闇內機單生蔽外象一時排冥筌泠然空中賞遣此弱喪情資神任獨往採藥白雲隈聊以肆所養丹葩曜芳蕤綠竹陰閑敞苕苕寄意勝不覺凌虛上曲櫺激鮮飆石室有幽響去矣從所欲得失非外獎至哉操斤客重明固已朗五難既洒落超迹絕塵網同上殷東陽興矚仲文殷東陽興曯矚仲文晨遊任所萃悠悠蘊真趣雲天亦遼亮時與賞心遇青松挺秀萼惠色出芳樹極眺清波深緬映石壁素瑩情無餘滓拂衣釋塵務求仁既自我玄風豈外慕直置忘所宰蕭散得遺慮同上謝僕射遊覽混叔原謝僕射遊覽堒混叔原信矣勞物化憂襟未能整薄言遵交衢總轡出臺省凄凄節序高寥寥心悟永時菊耀巖阿雲霞冠秋嶺眷然惜良辰徘徊踐落景卷舒雖萬緒動復歸有靜曾是迫桑榆歲暮從所秉舟壑不可攀忘懷寄匠郢同上陶徵君田居潛淵明種苗在東皋苗生滿阡陌雖有荷鋤倦濁酒聊自適日暮巾柴車路闇光已夕歸人望煙火稚子候簷隙問君亦何為百年會有役但願桑麻成蠶月得紡績素心正如此開逕望三益同上謝臨川遊山靈運江海經邅迴山嶠備盈缺靈境信淹留賞心非徒設平明登雲峰杳與廬霍絕碧障長周流金潭恆澄澈桐林帶晨霞石壁映初晣乳竇既滴瀝丹井復寥泬巖崿轉奇秀崟岑還相蔽赤玉隱瑤溪雲錦被沙汭夜聞猩猩啼朝見鼯鼠逝南中氣候暖朱華凌白雪幸遊建德鄉觀奇探禹穴身名竟誰辨圖史終磨滅且泛桂水潮映月遊海澨攝生貴處順將為智者說本集四文選三十一詩紀七十六又韻補五引泬蔽二韻澨說二韻顏特進侍宴延之顏特進侍宴延年延之太微凝帝宇瑤光正神縣揆日粲書史相都麗聞見列漢搆仙宮開天製寶殿桂棟留夏飆蘭橑停冬霰青林結冥濛丹巘被葱蒨山雲備卿靄池卉具靈變重陽集清氛下輦降玄宴騖望分寰隧矖目盡都甸氣生川岳陰煙滅淮海見中坐溢朱組步櫩簉瓊弁禮登佇睿情樂闋延皇眄測恩躋愉逸沿牒懵浮賤承榮重兼金巡華過盈瑱敢飾輿人詠方慚淥水薦本集四文選三十一詩紀七十六謝法曹贈別惠連昨發赤亭渚今宿浦陽汭方作雲峰異豈伊千里別芳塵未歇席零淚猶在袂停艫望極浦弭棹阻風雪風雪既經時夜永起懷思泛濫北湖遊苕亭南樓期點翰詠新賞開袠瑩所疑摘芳愛氣馥拾蕊憐色滋色滋畏沃若人事亦消鑠子衿怨勿往谷風誚輕薄共秉延州信無慚仲路諾靈芝望三秀孤筠情所託所託已殷勤祗足攪懷人今行嶀嵊外銜思至海濱覿子未僝聚凝睇在何辰雜珮雖可贈踈華竟無陳無陳心悁勞旅人豈遊遨幸及風雪霽青春滿江皋解纜候前侶還望方鬱陶煙景若離遠末響寄瓊瑤本集四文選三十一詩紀七十六又草堂詩箋六自京詩注引一句韻補五引汭別二韻王徵君養疾微王徵君養疾微窈藹瀟湘空翠澗澹無滋寂歷百草晦欻吸鵾雞悲清陰往來遠月華散前墀煉藥矚虛幌泛瑟臥遙帷水碧驗未黷金膏靈詎緇北渚有帝子蕩瀁不可期悵然山中暮懷痾屬此詩本集四文選三十一詩紀七十六又草堂詩箋三十五虎牙詩注引一句大曆詩注引一句黃氏集千家注杜詩補遺九引一句袁太尉從駕淑陽源宮廟禮哀敬枌邑道嚴玄恭潔由明祀肅駕在祈年詔徒登季月戒鳳藻行川雲旆象漢徙宸網擬星懸朱櫂麗寒渚金鍐映秋山羽衛藹流景綵吹震沉淵辨詩測京國履籍鑒都鄽氓謠響玉律邑頌被丹弦文軫薄桂海聲教燭冰天和惠頒上笏恩渥浹下筵幸侍觀洛後豈慕巡河前服義方無沬展歌殊未宣本集四文選三十一詩紀七十六謝光祿郊遊莊希逸肅舲出郊際徙藥逗江陰翠山方藹藹青浦正沉沉涼葉照沙嶼秋榮冒水潯風散松架險雲鬱石道深靜默鏡綿野四睇亂曾岑氣清知鴈引露華識猨音雲裝信解黻煙駕可辭金始整丹泉術終覿紫芳心行光自容裔無使弱思侵同上鮑參軍戎行昭明遠豪士枉尺璧宵人重恩光徇義非為利執羈輕去鄉孟冬郊祀月殺氣起嚴霜戎馬粟不煖軍士冰為漿晨上城皋坂磧礫皆羊腸寒陰籠白日太谷晦蒼蒼息徒稅征駕倚劍臨八荒鷦䳟不能飛玄武伏川梁鎩翮由時至感物聊自傷豎儒守一經未足識行藏同上休上人怨別惠休湯氏休上人怨別惠休湯氏西北秋風至楚客心悠哉日暮碧雲合佳人殊未來露彩方泛艷月華始徘徊寶書為君掩瑤瑟詎能開相思巫山渚悵望陽雲臺膏爐絕沉燎綺席生浮埃桂水日千里因之平生懷本集四文選三十一玉臺新詠五詩紀七十六悼室人十首悼室人十首佳人永暮矣隱憂遂歷茲寶燭夜無華金鏡晝恆微桐葉生綠水霧天流碧滋蕙弱芳未空蘭深鳥思時湘醽徒有酌意塞不能持本集四詩紀七十六適見葉蕭條已復花掩鬱帳裏春風盪簷前還鷰拂垂涕視去景催心向徂物今悲輒流涕昔歡常飄忽幽情一不弭守歎誰能慰同上夏雲多雜色紅光鑠蕤鮮苒弱屏風草潭拖曲池蓮黛葉鑑深水丹華香碧烟臨綵方自弔攬氣以傷然命知悲不絕恆如注海泉同上駕言出遊衍冀以滌心胸復值煙雨散清陰帶山濃素沙匝廣岸雄虹冠尖峰出風舞森桂落日曖圓松還結生不念楚客獨無容同上秋至擣羅紈淚滿未能開風光肅入戶月華為誰來結眉向珠網瀝思視青苔鬢局將成葆帶減不須摧我心若涵烟葐蒀滿中懷同上窗塵歲時阻閨蕪日夜深流黃夕不織寧聞梭杼音涼靄漂虛座清香盪空琴蜻引知寂寥蛾飛測幽陰乃抱生死悼豈伊離別心同上顥顥氣薄暮蔌蔌清衾單階前水光裂樹上雪花團庭鶴哀以立雲雞肅且寒方冬有苦淚承夜非膏蘭從此永黯削萱葉焉能寬同上抒悲情雖滯送往意所知空座幾時設虛帷無久垂暮氣亦何勁嚴風照天涯夢寐無端際惝恍有分離意念每失乖徒見四時虧同上神女色姱麗乃出巫山湄逶迤羅袂下鄣日望所思佳人獨不然戶牖絕錦綦感此增嬋娟屑屑涕自滋清光澹且減低意守空帷同上二妃麗瀟湘一有乍一無佳人承雲氣無下此幽都當追帝女迹出入泛靈輿掩映金淵側遊豫碧山隅曖然時將罷臨風返故居同上
