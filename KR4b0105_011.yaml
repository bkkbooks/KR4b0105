body:
  text: 齊藉田樂歌二首迎送神升歌迎送神升歌羽鑾從動金駕時遊教騰義鏡樂綴禮修率先丹耦躬遵綠疇靈之聖之歲殷澤柔南齊書樂志樂府詩集三詩紀六十三饗神歌饗神歌瓊斝既飾繡簋以陳方燮嘉種永毓宵民同上牲出入歌牲出入歌祝詳史具禮備樂薦有牲在陳有鼓在懸騰燭象星奔水類電郊燎夙戒駜彼乘駽以伺質明以佇神宴初學記十三詩紀六十三薦豆呈毛血歌辭薦豆呈毛血歌辭時恭時祀有物有則伊我上聖實抱明德犧象交陳鬱尊四塞黍惟嘉穀酒惟玄默薦通蒼祇慶覃黎黑願靈之降祚家佑國初學記十三詩紀六十三奏宣列之樂歌舞奏宣列之樂歌舞殷崇配天周尊明祀瑞合汾陰慶同泰畤青幕雲舒丹殿霞起二曜惟新五精告始于以享之景福是履初學記十三詩紀六十三齊鳳皇銜書伎歌辭齊鳳皇銜書伎歌辭皇齊啟運從瑤璣靈鳳銜書集紫微和樂既洽神所依超商卷夏耀英輝永世壽昌聲華飛南齊書樂志樂府詩集五十六詩紀六十三詠美人春遊詩江南二月春東風轉綠蘋不知誰家子看花桃李津白雪凝瓊貌明珠點絳唇行人咸息駕爭擬洛川神古詩類苑九十三征怨蕩子從征久鳳樓簫管閑獨枕凋雲鬢孤燈損玉顏何日邊塵淨庭前征馬還古詩類苑八十四詩紀七十五侍始安石頭城侍始安石頭城開局遶天邑襟帶抱尊華六朝事蹟類編上詩通渠運春流幽谷渙冰盪穢出新泉遊望登重陵玉燭寶典一自樂昌郡泝流入郴詩茲山界夷夏天際橫寥廓輿地紀勝五十七詩河州多沙塵風吹黃雲起升菴詩話西洲曲西洲曲憶梅下西洲折梅寄江北單衫杏子紅雙鬢鴉雛色西洲在何處兩槳橋頭渡日暮伯勞飛風吹烏桕樹樹下即門前門中露翠鈿開門郎不至出門採紅蓮採蓮南塘秋蓮花過人頭低頭弄蓮子蓮子青如水置蓮懷袖中蓮心徹底紅憶郎郎不至仰首望飛鴻鴻飛滿西洲望郎上青樓樓高望不見盡日欄杆頭欄杆十二曲垂手明如玉卷簾天自高海水搖空綠海水夢悠悠君愁我亦愁南風知我意吹夢到西洲井賦穿重壤之千仞兮搆玉甃之百節營之不日既汲既渫御覽百八十九傷愛子賦並序江艽字胤卿僕之第二子也生而神俊必為美器惜哉遘閔涉歲而卒悲至躑躅乃為此文惟秋色之顥顥心結縎兮悲起曾憫憐之慘悽痛掌珠之愛子形惸惸而外施心切切而內圮日月可銷兮悼不滅金石可鑠兮念何已緬吾祖之赫羲帝高陽之玄冑惜衰宗之淪沒恐余人之弗構覬三靈之降福佇弱子之擢秀酷奈何兮胤卿那逢天兮不祐爾誕質於青春攝提貞乎孟陬謂比方於右列望齊英於前修遰高行之美迹弘盛業之清猷白露奄被此百草爾同凋於梧楸憶朱明之在節顧岐嶷之可貴睨鑪帳而多怊瞻戶牖而有慰奚在今之寂寞失音容之髣髴姊目中而下泣兄嗟季而飲淚感木石而變哀激左右而隕欷奪懷袖之深愛爾母氏之麗人屑丹泣於下壤傃慇憂於上旻視往端而擗慄踐遺緒而苦辛就深悼而誰弭歸末命兮何陳我過幸於時私爰守官於江潯悲薄暮而增甚思曛黃而不禁月接日而為光霞合雲而成陰霧籠籠而帶樹月蒼蒼而架林嗟奈何兮弱子我百艱兮是尋驗纖帶之夜緩察葆鬢之朝侵惟人生之在世恆歡寡而戚饒雖十紀之空名豈百齡之能要迅朱光之映夜湛白露之凝朝指茲譬而取免排此理以自銷然則生之樂兮親與愛內與外兮長與稚傷弱子之冥冥獨幽泉兮而永閟余無愆於蒼祇亦何怨於厚地信釋氏之靈果歸三世之遠致願同升於淨剎與塵習兮永棄釋藏策人廣弘明集二十九下遂古篇並序僕嘗為造化篇以學古制今觸類而廣之復有此文兼象天問以遊思云爾聞之遂古大火然兮水亦溟涬無涯邊兮女媧煉石補蒼天兮共工所觸不周山兮河洛交戰寍深淵兮黃炎共鬭涿鹿川兮女岐九子為氏先兮蚩尤鑄兵幾千年兮十日竝出堯之間兮羿乃斃日事豈然兮姮娥奔月誰所傳兮豐隆騎雲為靈仙兮夏開乘龍何因緣兮傅說託星安得宣兮夸父鄧林義亦艱兮建木千里烏易論兮穆王周流往復旋兮河宗王母可與言兮青鳥所解路誠亶兮五色玉石出西偏兮崑崙之墟海此閒兮去彼宗周萬二千兮山經古書亂編篇兮郭釋有兩未精堅兮上有剛氣道家言兮日月五星皆虛懸兮倒景去地出雲烟兮九地之下如有天兮土伯九約寍若先兮西方蓐收司金門兮北極禺強為常存兮帝之二女遊湘沅兮霄明燭光向焜煌兮太一司命鬼之元兮山鬼國殤為遊魂兮迦維羅衛道最尊兮黃金之身誰能原兮恆星不見頗可論兮其說彬炳多聖言兮六合之內心常渾兮幽明詭性令智惛兮河圖洛書為信然兮孔甲豢龍古共傳兮禹時防風處隅山兮春秋長狄生何邊兮臨洮所見又何緣兮蓬萊之水淺於前兮東海之波為桑田兮山崩邑淪寍幾千兮石生土長必積年兮漢鑿昆明灰炭全兮魏開濟渠螺蚌堅兮白日再中誰使然兮北斗不見藏何閒兮建章鳳闕神光連兮未央鐘虡生華鮮兮銅為兵器秦之前兮丈夫衣綵六國先兮周時女子出世閒兮班君絲履遊太山兮人鬼之際有隱淪兮四海之外孰方圓兮沃沮肅慎東北邊兮長臂兩面亦乘船兮東南倭國皆文身兮其外黑齒次祼民兮侏儒三尺竝為鄰兮西北丁零又烏孫兮車師月支種類繁兮馬蹄之國善騰奔兮西南烏弋及罽賓兮天竺于闐皆胡人兮條支安息西海漘兮人迹所極至大秦兮珊瑚明珠銅金銀兮琉璃瑪瑙來雜陳兮硨磲水精莫非真兮雄黃雌石出山垠兮青白蓮華被水濱兮宮殿樓觀竝七珍兮窮陸溟海又有民兮長股深目豈君臣兮丈夫女子及三身兮穿胸反舌一臂人兮跂踵交脛與羽民兮不死之國皆何因兮茫茫造化理難循兮聖者不測況庸倫兮筆墨之暇為此文兮薄暮雷電聊以忘憂又示君兮宣城本隱陵集五釋藏駕七廣弘明集三南郊明堂異日議郊旅上天堂祀五帝非為一日再黷之謂無俟釐革南齊書禮志銅劍讚並序永明初始造舊宮鑿東北之地皆平岡迤隴尤多古冢墓有人得銅劍長尺五寸余既借看歎其古異客有謂余曰古時乃以銅為兵乎其可得而聞不余笑而應曰此證據甚多殆不俟言卿既欲知輒具言之余案山海經曰昆吾之山其上多赤銅郭璞注曰此山出金如火以之切玉如割泥也周穆王時西戎獻之尸子所謂昆吾之劍也越絕書曰赤墐之山破而出錫若邪之谿涸而出銅歐冶鑄以為純鉤之劍又汲冢中得一銅劍長三尺五及今所記干將者亦皆非鐵明古者以銅錫為兵器也周書稱穆王時征犬戎得昆吾之劍火浣布長尺有咫又有鍊銅赤刀割玉如泥焉又左傳僖公十八年鄭伯始朝於楚楚賜之金既而悔之盟曰無以鑄兵故以鑄三鐘杜預注云楚金利故也古者以銅為兵故禹貢云荊揚貢金三品余以為古者語質而難解今者語文而易了獨詩云元龜象齒其實象牙也書云厥包橘柚乃黃柑也金品上則黃中則赤下則黑黑金是鐵赤金是銅黃金是金黃金可為寶赤金可為兵黑金可為器韓子稱昔智伯繇之伐趙襄子初晉陽襄子金將盡問於張孟談孟談對曰吾聞董安于治晉陽也公室悉以銅為柱質君可發而用之於是發之有餘金矣謂此據蓋可知焉又昔夏后氏使九牧貢金鑄九鼎於荊山之下于昆吾氏之墟白若甘攙之地圖其山川奇怪以形于鼎使民知神姦不逢其害以定其祥鼎成三足而方不炊而自沸不舁而自藏不遷而自行九鼎既成定之國都桀有昏德鼎遷於商殷紂暴虐鼎遷於周每人主休明鼎雖小而重其姦回昏亂雖大而輕及周顯王三十二年姬德大衰乃淪入泗水秦始皇之初見於彭城二十七年始皇東遊大發徒出之而不能得焉後漢武帝賓禮百神于汾陰得大鼎時人以為九鼎其詳不可得而審也且荊軻刺秦王之日匕首擊銅柱銅柱火出則古者非直以銅為匕首亦以為殿柱也且始皇之世長狄十二見於臨洮身長三丈足跡六尺於是始皇斂天下之兵鑄而象之故西京賦云高門有閌列坐金狄是也又造阿房之宮其門悉用鎡石鎡石噏鐵以防外兵之入焉以此推之明知春秋迄於戰國戰國至於秦時攻爭紛亂兵革互興銅既不充給故以鐵足之鑄銅既難求鐵甚易是故銅兵轉少鐵兵轉多年甚一年歲甚一歲漸染流遷遂成風俗所以鐵工比肩而銅工稍絕二漢之世逾見其微及漢建安二十四年魏文帝為太子時鑄三寶刀二匕首天下百鍊之精利而悉是鑄鐵不能復鑄銅矣按張華博物志亦稱鑄銅之工不復可得唯蜀地羌中時有解者由此言之斯妙久絕余謂不復能鑄銅者正當不能使利如霜雪光如雲霞陸斬犀兜水斷蛟龍豈復不能鑄銅鑪鋺燈耶然今太極殿前兩大銅鏡即周景王鑄也製作精巧獨絕晚世今之作必不及古猶今鏡不及古鏡今鐘不及古鐘矣昔余為吳興令鑿池又獲銅箭鏑數十枚時有人復於彼山中伐木得銅斧一口古銅鑄為兵豈為一據故備言其詳以發子之蒙矣古貴銅賤鐵非獨此事按皇覽帝王冢墓記稱吳王闔閭冢銅槨三重汞池六尺玉鳧之流扁諸之劍三盤郢魚腸之劍在焉秦始皇冢亦以銅槨水銀為江河關東賊發之至銅槨而取銅深大不可多得因此穴墓漢思王冢時奢侈皆生葬取愛幸奴婢蓄穀為銅窗以通殉葬者氣息兼以水火守冢給呼召數十年乃不復聞聲矣晚世之葬無復此例然猶自大奢大富大盛或傾一國之財或竭一家之寶或爭為宏麗或競相高尚前漢奢於後漢魏時富於晉世中原既夷至於江左時天下凋喪制度日衰富貴之家猶或厚葬然論古論曩亦減損千萬倍矣世愈貧狹哀禮愈薄又往古之事棺皆不用釘悉用細腰其細腰之法長七寸廣三寸厚二寸五分狀如木秤兩頭大而中央小仍鑿棺際而安之因普漆其外一棺凡用細腰五十四枚大略如此亦可謂至巧矣其法既絕亦有銅釘銅釘之體皆如今柘釘形也銅釘既滑多被發掘自義熙以來乃以柘代銅爰及明器之屬亦多減省必不得已乃用烏牙焉相與皆用素棺不得施漆及自棺之外一無所設既由貧富之懸兼以避患之及耳故為此讚以明古今銅鐵之兵刃葬送之事焉乃成讚曰悠悠開闢或聖或賢蚩尤鑄銅為兵幾年天生五才實此為先既古既曩誰測誰傳紛綸百代事無不異況迺金鐵國之利器風胡專精歐冶妙思於昔則出於今則祕聞之釋經萬物澹薄在古必厚在今必惡徒侈徒異徒鏟徒削聊舉一概以明鴻略無為論並序吾曾迴向正覺歸依福田友人勸吾仕吾志不改故著無為論焉有奕葉公子者聯蟬七代冠冕組望多素紈黼衣繡裳負長劍而耿耿佩鳴玉而鏘鏘時遊稷下或客於梁聞英雄而豹變聽利害以龍驤乃動朱履而馳寶馬振玉勒而曜金羈之無為先生之門問曰先生智德光融嵩華無得以方其峻道義清遠溟海不足以喻其深無學不窺無事不達容儀閒靜言笑溫雅至如釋迦三藏之典李君道德之書宣尼六藝之文百氏兼該之術靡不詳其津要而採摭沖玄煥乎若睹於鏡中炳乎若明於掌內余聞天地之大德曰生何以聚人曰財是故老聃以為柱史莊周以為園吏東方持戟而不倦尼父執鞭而不恥實萬古之師範一時之高士先生嘉遁卷迹養德不仕乃列子之所待非通天下之至理雖江海以為榮實縉紳之所鄙先生攸爾笑而應之曰富之與貴誰不欲哉乃運而不通也夫忠孝者國家之急務也申生伍員不得志也懷道抱德玄風之所尚揚雄東方其職未高也其大學者不過儒墨亦栖栖遑遑多有不遂也子所引之士者情雖欲之志不行也憂喜不移其情故可為道者也過此已往焉足言哉吾聞大人降迹廣樹慈悲破生死之樊籠登涅槃之彼岸闡三乘以誘物去一相以歸真有智者不見其去來有心者莫知其終始使得湛然常住永絕殊塗無變無遷長祛百慮恬然養神以安志為業故使自天祐之吉無不利舒卷隨取進退自然遁逸無悶幽居永貞亦何榮乎亦何鄙乎子其得之吾何失之塵內方外於是乎著公子恧然而有慚德逡巡而退廣弘明集二十九下
