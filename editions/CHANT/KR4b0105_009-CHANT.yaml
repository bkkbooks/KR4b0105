body:
  text: 卷九蕭讓太傅相國齊公十郡九錫表蕭讓太傅相國齊公十郡九錫表備九錫之禮非常之冊分天而降冠古之典開河而出遙然以慚魂交象魏中謝臣聞日月權輿二儀所以剋靈君臣設極三統所以式固惟生與位謂之大寶辨諸文而尊卑既炳觀群龍而貴賤可正雖復殷因於夏王資於帝至乎建侯分職體國經野其揆一焉是以二周之始山河愈廣兩漢之初封賞彌盛然表東海者實牧野之日瞻魯邦者乃負圖之辰西都英相信命世之功關中上宰亦龕亂之力秬鬯彤弓本西伯之賞虎賁戎路又晉公之典若乃衣裳盟會九合一匡猶慚其德斯禮也臣實鄙才靡識大體徒以忠貞為概而勞不足銘雖以丹素為誠而功無可勒豈有經天緯地之略探隱炤寂之智哉抑亦何術以堪盛休是以覽雲際而懷古憑軒榥而未寧也伏惟陛下神華馭世理無不鏡賜臣待謗今職守其私滿則天下有道庶人不疑矣藝文類聚五十三第二表第二表臣公言臣近厲心罄辭寫情畢議眇望神藻鑒見丹襟而帝閽以祕綸誥方明中庶卷容左右軫慮中謝臣以為麗天秉經君上之彝憲儀地執緯臣下之恆軌故皇極載凝庶士交慎昔者重黎勤官裁居炎冥之職羲叔能任方掌日月之序至乎御龍勤夏未聞冠俗之爵大彭翼商豈見超世之典以古先哲后如茲之慎賞也臣乃謬貽國寄志在靜難若夫野戰虹蜺伏順者易為威城攻鯨虺奉國者理必全雲氣薄蝕下民咸貴其明恃險輿馬舟中皆可異議故昌邑有歸邸吳楚無旋師斯激芬揚蕤物同其幸焚惡去醜世共其庇實為仰憑俯順之效臣亦何力之有焉竊謂祿為十郡必俟禹迹之勤錫以九命乃須周公之美況呂梁不鑿而器重玄珪越裳未獻而賦擬千乘京關識其崇貴畿服知其忝冒鏡前脩而慚形覿往德而聳慮畏崖之請取誓深水審量之祈呈炤皦景伏願陛下遠牽雄範近覽英規憑霞停詔臨風輟恩豈伊愚臣方獨昌化具日遺氓咸蒙其賴矣藝文類聚五十三被百僚敦勸受表被百僚敦勸受表臣公言臣款誠素履頻載縑翰天飾高獎累降史筆即日尚書臣某等至重宣詔旨猥辱百僚省睇未交心靈已悸中謝臣聞良宰謀朝不必借威貞臣衛主脩己則足故驕滿之失取鏡函關謙側之美見炤伊闕臣本庸人識無遠度藉開闢之辰遭攙搶之運姦回內奰則戮力瓊都諸侯放命則抗節瑤祀秉號仗義幸不辱威皆為冕旒遙鑒之明群士畫圖之助臣寧望伊摯叔且之爵呂牙申伯之賞哉方欲謝簪東都濯冠汾陽不悟盛禮華典復臻於茲靜默迴環祗畏躑躅猶謂遇聰明之朝當時雍之世陛下詠堯風之化歌卿雲之詩日月華采萬方獲性疊慮仰祈必蒙題品而威嚴窈絕斯冀遂阻鑾輿玉駕復許敦幸重臣愆悔無地自安便當謹恭鴻命竭身為限蕭拜相國齊公十郡九錫章殊命寶典鬱降雲天采昭軒騎光流城禦震驚華禮神氣交越中謝臣才謝深英器慚遠度進寡兵車召陵之盟退靡朝歌河內之會無束馬山戎之績懸車流沙之功故望寵未安踐榮加懼況納陛朱戶事絕群班金璽綠綬儀參鴻典聞命屏營以憂以墜近申微款日月之鑒既阻方懼難慊蘭芳之旨愈峻遂致百辟卿后踟躕於衛闕鑾輅旗旂方幸於臣府悵然遙慮將貽厚戾文章徒單迄無蠲省而天威咫尺丹懷罔固輒肅恭文物翹拜榮禮違距以深追增怵迫德輶寵盛於斯為徵非臣鄙虛所能酬對蕭相國讓進爵為王第二表蕭相國讓進爵為王第二表臣結慮歸請三辰未鏡傾魂仰視九天彌阻重炳徽策再晣光誥理晦情震若涉嚴淵中謝臣業不出世績未逮古謬藉明政陳力就列艱多智寡翊贊罔樹若乃洪範不脩鍾綴旒之日九黎亂政當摧軸之辰雖瀝命奉時禍提下亟防明之陋貽慚昔人杜險之蔽取愧前英故十萬之師無集槀街之邸千金之貴恆單白藏之府戈船發於江湖戎車出於石城然後雲徹席卷虔劉巨禍臣實恧焉不悟上賞亟降華爵必集雖延首紫扃翹意宸居執為守約之志既謝簡鑒避賢辭智之請終無開允故受任專征遠邇知寵肇封四履侯甸推禮昔虞思勤夏不列殊物之錫晉叔匡周豈頒上公之典燕藩懿親裁蒙袞舄之榮梁國戚屬方忝旌旗之貴而臣包括庶揆總納儀形蓋出近古非三代之遠體也今復乃踰九命爰超五等域中之稱麗天作則探情顧抱豈所允安者哉伏願陛下一檢丹崖遂臣慊心無使怵迫深貽疵戾戾藝文類聚五十一蕭相國拜齊王表臣無佐夏匡殷之功威晉服楚之績業不題於宗器聲靡記於彝典而超居上禮邈乘峻爵靜念隆替焦原非譬中謝臣以為眾官咸事帝謨所以式序群后剋讓王猷所以載穆況臣訪德語勤未洎伊稷之能藉靈懷寵以濫周邵之秩故駐魂仰請瀝意歸聞理竭素牒事罄丹史具徽太微備簡玉繩而才輶志淺隔景絕炤朱輪之使日月亟紆金鑾之尊旦夕將拂巡情覽識豈伊寧處今便肅典內軒恭服外屏大夫有命古或無違王假有廟今臣為叨三省空懦震懅于心齊王謝冕旒諸法物表齊王謝冕旒諸法物表臣王言以軒冕雲蹕既非常之飾宮懸玉戚乃配天之禮故呈襟效慮必期蠲亮重被還旨芳訊愈越鏡伏殊私情影遠震中謝昔大啟營丘未備樹羽之賞光宅曲阜始兼龍旂之貴況道狹慶隆身薄器尊粉繡爭輝藻火競耀夫太常圖列星之采華蓋觀古人之情所以聳絕百縣崇隔萬㝢鳳閣因此而神瓊都由茲而麗故愧功慚德違儀避榮誠不遙孚理無敻達遂貽嚴誥爰斷辭表驚慄遲迴祈鑒何地便當肅對王休敬昭異寵佩服盛文以慨以懼藝文類聚六十七齊王讓禪表齊王讓禪表陛下遠規唐虞永揖之典近謨漢魏高樹之禮既覽金水昏明之數又協雲電隆替之徵激風太上扇采至公聞命驚爽心靈殞越中謝臣聞天地草昧而樹之君所以平對二儀顯臨萬國膺符受曆總明司幽軒轅陟祚首出庶物顓頊登庸作為民紀雖五德迭興十代繼運非賢非睿莫預斯位若乃與能之交禪錫之會豈伊虛薄所可遵擬昔傅巖佐商秩終上公磻溪翼周名極列伯臣才非若人功愧遠聖獄訟不往謳歌寧歸河乏馬圖之寶天無乘龍之錫元首股肱誓不可異而曠乘之軌忽臻於茲慚慨憂灼罔識其際伏願陛下遺舜禹之心臣守巢由之節則道燿日月澤浸飛泳聲振開闢仁動今古四三王而六五帝不亦休哉藝文類聚十四遣大使巡詔遣大使巡詔門下昔明王馭世巡嶽采政睿后司朝觀俗調化故生無鬱滯物獲脩通釐風拯患於茲為急朕以輶薄昧于大道因璿璣之曆遵三德之運緬鑒前哲寤寐永歎思所以闢訪治蠹詢求民瘼才寡務殷若無津漈故以情深危薄心疚夙夜矣可普遣大使分行四方推賢薦能問疾舉滯若其采野不闢犴訟有虧妨氓利害擾黷政經者具以奏聞如其讜言嘉話真士智才亦依名謄上隨事均量務取厥中朕將親覽以弘遠化賜赦交州詔門下交部昔值時詖負海不朝因迷遂往歸款莫由今創制萬㝢烟熅造物原刑四裔澤浹中畿慜彼邊氓未均王化宣弘遠仁蕩以更始可曲赦彼州統內咸同曠泰李叔獻一人即撫南土其股肱文武詳材選推並遣大使宣揚朝旨斷募士詔門下設募取將懸賞購士蓋出權宜非曰經制頃者民罹氛藹世襲艱阻因時流故浸以成俗斯風蕩而未返且滋長逋逸開罪山湖遂乃黥刑不辱草竊無咎平政察治萌合甄革自今已後可悉斷眾募封江冠軍等詔門下締基緯業序功攸急開曆闡祚酬庸為先故以式藹曩書載炳前軌文仲假等或誠亮艱危效彰屯詖皆績幹兩宣勤圖兼立宜各分珪社以酬厥勞謐大赦詔門下朕思弘風教而刑圄猶積永言前烈兢歎載懷今履端告始群后執贄治洽樂郊華夷同泰雖歌慚擊石采愧卿雲然景業初基義深恆典慶動玄靈歡溢都縣憫彼幽黔猶隔茲澤思我兆民共熙至化北伐詔門下朕統曆馭政志包函夏庶總文軌無思不服而逖焉狡虜久為邊虞及宋末不庭授策乖律北州外淪威風內毀鑒彼隆替慨歎盈懷冕旒濟河翦彼凶狄咸秩中岳望祀汾陰則聲教鬯矣猶以經綸惟始恩化甫洽勞民擾眾為政所重故方輟六師按經九伐今淮泗告驚羽書馳聞醜羯妖燼送死北垂徵天人之數撫自來之會無勞遠兵剿撲為易蓋因茲大號蕩其巢藪可遣使某官組甲十萬鐵騎千馬斜趣潁洛衝其要津某官某虎旅八萬舳艫數千沿淮長驅稜威青汴某官某舟師五萬直出淮淝某官控江右之銳駱驛繼進某官某率羽林勁勇為水陸形援某官某甲等並率義勇之眾牙制掎角之機戎車戒路事宜總一使持節都督南徐兗二州諸軍事後軍將軍南徐州刺史長沙王晃出次江都為眾軍節度驍雄競奮火烈風掃剋定中原肅清河洛便可內外纂嚴以時備辦王僕射為左僕射詔王僕射為左僕射詔門下端貳樞祕寔惟國禎緝典宣機所寄時彥尚書右僕射領吏部尚書南昌縣開國公儉器懷明亮風情峻遠業積珪璋才兼經緯況乃節亮帷幄譽敷端揆升授之宜蓋允具瞻可左僕射王撫軍為安東吳興詔門下震澤殷奧撫馭須才都官尚書撫軍潯陽郡開國公敬則志幹貞烈秉情開敏忠勤之至形乎出內必能綏懷大邦剋隆美政可安東將軍吳興太守曲赦丹陽等四郡詔門下朕興言民瘼昧旦求政所以庶存簡惠緝茲治道而玉燭未調祥風尚鬱京輔及二吳昔歲水災秋登既罕今茲厲疾罹患者多納隍之歎為矜良深可曲赦揚州所統丹陽吳興南徐州所統義興等四郡其遭水尤劇之縣自今年以前三調未充而虛例已畢官長局吏應共備償者雖即事為愆情在可亮外詳所除以弘優澤王僕射領太子詹事詔王僕射領太子詹事詔門下管司東朝歷代所重自非國華莫允斯任侍中尚書左僕射南昌縣開國公儉鑒識清贍理懷秀澈績亮朝端譽敷僉議贊業攸光物聽斯緝宜總二官以穆彝序何詹事為吏部尚書詔何詹事為吏部尚書詔門下官人之職實難其選所以弼諧彝品謨明庶績今思治惟急彌不可曠侍中太子詹事戢業履脩平體識詳穩自升宮闥美譽咸聞必能無懈于位燮茲流序王侍中為南蠻校尉詔門下荊楚殷曠任重寄深毗佐之選非良勿授侍中領祕書監驍騎將軍奐秉心貞元志局開亮績譽之美在公屢彰必能贊政南紀播惠西夏王光祿為征南湘州詔門下衡岳名區荊湘奧壤自頃凋弊綏撫須賢侍中光祿大夫丹陽尹僧虔德履淹邃識局詳正沖素之行朝望攸歸歷職之庸載懷僉聽往任沅湘餘惠在民今宜重敷善政申此懿績柳僕射為南兗州詔門下河兗衝要維扞中畿司牧之任宜詳其授後將軍領軍新除尚書左僕射溳陽郡國公世隆業體淹濟思情通敏功書王府績彰累任必能宣弘恩政威懷萬里雖哀疾毀頓而禮有權奪王僕射加兵詔門下散騎常侍尚書左僕射太子詹事南昌縣開國公儉忠款昭著任寄隆深既光朝猷允屬民聽宜增威飾以崇望實可加兵二百立學詔門下夫膠庠之典彝倫攸先所以招振才端啟發性緒弘世字氓納之軌儀是故五禮之迹可傳六樂之容不泯朕自膺曆受圖志闡經訓且有司群寮奏議橫集以戎車屢警文教未敷思樂辟雍永言多慨今關燧無虞時和歲稔遠邇同風華夷慕義便可式遵前準脩建斅學精選儒官廣延國冑王鎮軍為中書令右光祿詔門下綸言要密歷選為難優秩崇顯允在舊德使持節都督江州豫州之新蔡晉熙二郡諸軍事鎮南將軍江州刺史延之業履沖約秉情閑素譽彰頻試績著累朝自居南服徽庸剋舉宜升寵章管兼樞祕張令為太常領國子祭酒詔門下庠議既敷縉紳攸屬師氏之任宜歸儒素散騎常侍中書令驍騎將軍揚州大中正緒器識清簡理懷恬約譽洽朝聞聲緝民聽必能闡揚玄宗式範冑子兼掌宗伯望實惟宜蕭冠軍進號征虜詔門下維翰之重實資名品使持節都督郢州司州之義陽諸軍事冠軍將軍郢州刺史南昌縣開國侯鸞體局弘濟器操端敏自蒞任夏首美政殷流必能聿宣國化以庇人瘼宜崇顯秩允茲聲望褚侍中為征北長史詔褚侍中為征比北長史詔門下蕃佐須才非良莫寄侍中領步兵校尉炫識業清悟思懷淹暢出內之譽日聞其美宜弼諧親屏以申茂績
