body:
  text: 卷七敕為朝賢荅劉休範書昔媯道鼎昌干羽未能戢姬德昭宣長旌猶卷舒焚衣毀冕有自來矣皇宋靈武誕命聖道鬱宏三后連光四聖沓軌或經天緯地搆紫靈之符調風偃海隆黃旗之祚莫不頌滿金石聲彯宇宙者也暨我太宗明皇帝惟岳降聖重耀函夏延禮璧臺訪道衢室平陽之后卷迹慚靈空同之君斂功謝德是以綵雲祥風之瑞布濩區中梯山棧火之俗款徼請吏跨商軼夏洗周滌漢道澤優衍猶不道封禪遐靈在天餘惠無泯主上文明金相穆然玉色履璧之禎獲珪之應著在紀歲仁浸汙河惠愛秋草想亦君之所聞也重以先帝靈略潛通英轡遠馭受話言必忠貞方肅之臣奉風聲必虔恭匪懈之士明時琴瑟鼎鉉之盛且被於寧世而忽覿來書以惋以慨君為齊梁楚越之主鼎貴一時金玉滿堂文馬千駟爵授湯沭冠蓋於道惟名尊崇誰與為雄而出言效尤吐音入戾舉旗類社志竊神禁稱兵斂眾遂窺外關今朝無闕政頓構凌上之節室無嬖豎坐生莫大之舋鴟梟赭衣號興徒黨主萃淵藪寧滋之甚不臧不軌不忠不義未有若斯者也宗枝之釁遠則吳楚見禽於一壁盤石之孽近則江荊面縛於小將此成敗蘭艾之鑒又亦君之所知也聞彼蟲飲鼠舞之異早見物徵河北隴上之謠已露童詠所謂妖由人作孽不可逃然桓侯之患良助寒心今羽林黃頭駱驛爭引熊渠佽飛首尾電發伏波樓船掩江蔽汜渡遼甲卒充野布隰加以先天蓋世之略蕩海拔山之威任輔沛陳羽林鷁鵃露動龍驤精騎風驅然後六師雲起九軍星連蜺旌外江虹艗中水金甲映平陸鐵馬炤長原蹴南嶽而永慨瞰九派而懷恐伐罪弔民復驗於茲甫刑三千唯此為大僕才等不羈志瀝丹款故奏禍福行矣悵然袁褚劉蕭等疏尚書符侍御史大夫尊冠賤履君臣斯位愛順惡逆成敗可曉未有憑凌我江郊侵軼我河縣而不流魂漂骨丹宗血祀者也沈攸之寂寥無聞起自甲卒邀我百戰之軍乘彼一捷之幸鐫山裂地紐紫要金擁旗藩伯便無北面之禮受符方屏即有專征之釁箕賦深歛毒被南郢枉法矯刑害著西荊鬼怪其性故從始而遂終狼戾其志乃沿少而得老山陵不奔移殃為慶踐祚無賀按劍稱予遂乃關馳送書亭炤妖火此而可孰不可宥今遣陳承叔彭文之等敢勁三萬前驅電躍呂安國任侯伯垣崇祖曹虎頭等樓艦五萬射蛟中流苟元賓郭文孝程隱雋等輕舸二萬高旌蔽日周盤龍張文憘薛道淵等鐵馬五千龍驤後陣凡此諸帥莫不氣薄日月精變虹蜺或飲羽石梁或超踰亭樓索鐵拔距孤視萬旅顧眄則前後生風喑嗚則左右激電然後鑾戎薄臨驍虎百萬六軍徐軌五輅遲旆丹艦發炤素甲生波樓煩白羽投鞍成岳漁陽黑騎浴鐵為雲於是高山與深谷共湮紫芝與白艾同滅不亦惜乎符至之日幸加三省其驅逼寢手之人鋒陣塢壁之主若有投命軍門一無所問或能因罪立績賞不示私斬袪射玦唯功是與購募之科具列如上信如白水皦然無二臺明詳旨飛火普加宣下文書千里馳驛宋書沈攸之傳尚書符尊冠賤屨君臣之位奉順忌逆成敗斯兆未有憑凌我郊圻侵軼我河縣而不焚師殪甲靡旗亂轍者也沈攸之少長庸賤擢自閻伍邀百戰之運乘一捷之功鐫山裂地腰金拖紫窮貴於國極富於家擁旄蕃伯便無北面之禮受督志屏即有專征之釁橘柚不薦璆㻸罕入箕賦深斂毒被南郢枉繩矯墨害著西荊饕餮其心谿壑其性從始至終沿壯得老今遂驅迫妖黨繕集尫卒結釁外城送死中甸是而可忍孰不可懷今遣新除使持節督郢州司州之義陽諸軍事平西將軍郢州刺史聞喜縣開國侯黃回員外散騎常侍冠軍驍騎將軍南臨淮太守重安縣開國子軍主王敬則輔國將軍屯騎校尉長壽縣開國男王宜與輔國將軍南高平太守軍主陳承叔輔國將軍左軍將軍南濮陽太守葛陽縣開國男軍主彭文之龍驤將軍驃騎行參軍軍主召宰精甲二萬前鋒雲騰又遣散騎常侍領游擊將軍湘南縣開國男新除使持節督湘州諸軍事征虜將軍湘州刺史軍主呂安國屯騎校尉寧朔將軍崔慧景輔國將軍軍主任候伯輔國將軍驍騎將軍軍主蕭順之輔國將軍游擊將軍軍主垣崇祖寧朔將軍虎賁中郎將軍主尹略屯騎校尉南城令曹虎頭舳艫二萬駱驛繼邁又遣輔國將軍後軍將軍右軍中兵參軍事軍主苟元賓寧朔將軍撫軍中兵參軍事軍主郭文孝龍驤將軍撫軍中兵參軍事軍主程隱雋輕艓一萬截其津要新除持節督廣交越寧湘州之廣興諸軍事領平越中郎將征虜將軍廣州刺史統馬軍主沌陽縣開國子周盤龍輔國將軍後軍統馬軍主張文憘龍驤將軍軍主薛道淵冠軍將軍游擊將軍并州刺史南清河太守太原公軍主王敕勤龍驤將軍射聲校尉王洪範龍驤將軍冗從僕射軍主成買等鐵馬五千龍驤後陳凡此諸帥莫不勇力動天勁志駕日接衝拔距鷹瞵鶚視顧盻則前後風生暗嗚則左右電起以此攻城何城不克以此赴敵何陳能堅然後鑾戎薄臨龍虎百萬六軍齊軌五輅舒斾丹檻發照素甲生波樓煩白羽投鞌成岳漁陽墨騎浴鐵為群芝艾同焚悔將何及符到之日幸加三省其鋒陳營壁之主驅逼寇手之人若有投命軍門一無所問或能因罪立績終不爾欺斬裾射玦唯功是與能斬送攸之首封三千戶縣公賜布絹各五千匹信如河海皎然無貳飛火軍攝文書千里驛行慰勞雍州文慰勞雍州文皇帝謝鎮軍寧蠻二府雍州文武士庶等夫忠為令德或感概殺軀信實美行或殉義蹈節而沈攸之小豎反覆稱逆西藩袁粲劉秉潛使相扇遂擁據石頭並圖廟社粲秉既從王憲蒼黎同慶攸之孤州蟻聚勢必燼滅刺史張敬義氣雲騰秣馬星驅全羽十萬殄茲氛鯨曾不旋踵彼州南陽白水將相遺風忠義之士霜戈電發但戎車暫動念原未寧冬寒卿皆無恙蕭驃騎讓封第二表蕭驃騎驤讓封第二表臣某言寫瀝愚丹已續前表猥降前詔未垂鏡恕一省驚慚再悸魂府靜躬自察啟居匪地中謝臣聞日薄星迴昊天無以爽其節山盈川沖厚地不能虧其度豈不靈鑄言限神極無失況世道恆淪人彝剽奪數滿必沿虛飾小故辭大臣才非古賢任鈞左戚祚開山河兼金疊組爵侈常班寵溢前達以榮以渥且慚且靦雖嘉銘鼎之恭更懼循墻之速矧乃三司業貴上將地崇總錄務廣河汾寄深珪㝢方啟劍衛增肅既驚朝野足震城邑殷周富士猶難其人漢魏多才亦罕兼職且麟閣之臣尚有位不及鉉全器之侯猶或任不並台名爵無假前世之雄規車旗勿濫中葉之英軌況鴻誥鬱集懋冊頓萃諒非虛薄輕所膺符今殷夏既聲封國式固故天地燀燿日月更煇陛下停若鏡之明流如雲之愛方求士於板巖宜思賢於屠肆而私臣以闈廟寵臣以帷鼎位兼文武職總內外非所以發夢渭濱儲精河藪鐫金刻石既不可詮輿歌里頌其謂臣何仰緣大道方行蒼祇宅氣威靈所燭九功咸詠寧於庸臣獨隔恩耀誓守愚衷重扣雲日如蒙恩宥實生之幸不任慊款之至藝文類聚四十七第三表第三表臣某言臣再抽慊請辭偽理屈側守圭漏伏望衷鑑而宸緯嚴祕愫悰徒懸優獎之降非復常旨肅奉驚懅曛曉如失中謝臣炤冊訪古誦史稽昔以為敷道之寄管物成務總錄之重匡績毗風莫不下協河岳上踵光緯先王所以長世後睿所以字氓讚金圖之要輔樞曆之機者也臣本瑣姿不慕聞達昔值英世頻遘時來感激光私未能自返烏可超乘厚任妄據高圖天道既平鬼神好謙臣亦何人而獨斯處所以不恤色忤頻犯鴻威者正以方圓之景已滿丹彩之色難加政能緯俗匪務傍職坐而燮道必在其人若臣武未屬鞬櫜之分文不藹樽俎之間德非時秀道乖物宗虛飾疲伍空貽上位則天變彰於飛流地眚見于震壓驚蕩民聽蕪沮物議綸言之出不追金石之謬已遠豈唯敗錦傷經毀鼎覆餗而已哉自非西京上績東都名勳河右群賢江左諸彥寧有誣叨天爵以為己功者也昔南楚偏君鄢郢小政執珪柱國尚不輕授況車軌共文四溟同宅而以鄙蔽超居金鉉殊任鬱起臣心憂魄悚視丹如綠伏願陛下暫停冕纊少察愚實鑒臣靦情愍臣孤志廣天下之惠可疋夫之諒則國步永清陛下永無謬悞不任憂駭之情蕭領軍讓司空並敦勸啟臣某言臣沿心之請丹識以傾詔旨沖挹便賜斷表伏聞當遣王人猥垂獎勸仰天光休俯增驚厲中謝臣以為槐鉉之任百王攸先具司是屬冠冕式瞻化曜昌煇連基政務事深崇替迹豫興衰故道富一時則風行明令才乏適權則山摧河泣既撓汩蒼祇將紊毀身國臣進退惟疑再三自顧實以陋情非忘寵極但畏軼超疲伍迺參鼎軸無德而貴豈敢偷存才怯任重物所不恕故弱識褊概頻布前辭枯木朽株永隔蠲恕豈特大車方塵小雅有廢而已哉將據致寇之悔取鑒於茲矣且皇華之命居上之鴻私鳳舉之招為下之殊榮國勳必書史不謬牘況臣連牧圉岳董率職方既鑠近古垂耀中葉揆望揣實為泰已甚而迺復降朱輪之使方枉青冊之勸寤寐悁灼諒無以任輒重素誠冒覬神炤伏願皇靈特垂開愍賜停正台之職並免敦勸之使餘所榮忝誓不敢辭肅恭外屏祈迴恩授則於臣慊款復為惠造不任憂戴匪惶之情蕭領軍拜侍中刺史章上書皇帝陛下即日詔書以臣為侍中驃騎大將軍開府儀同三司班劍三十人等持節都督如故峻命在庭光冊充軒虹驂聳服朱轙佇蓋夤對以懅心影若傾中謝臣功乏至道不足以題象魏績非振民無可以書廟閣半漏未晏中鍾而驚實忌徵庸超乘盛服竊疑國寵頓萃末躬今寰海順典瓊都咸光調御惟新鎔製就始良宜整變憲經詮明典緯九河式耀三辰載晰不悟陛下皇靈曲溢大賚斯降而鴻賞之行迺於臣始非所以騰振遙風激昂品流輿人之誦具聞其黷頻露慊祈未阻鑒順今使虔禮青軒謹躬丹墀憂符怵怡慚屬兼軫不任屏營之情蕭驃騎錄尚書事到省表臣某言臣自妄蒙異寵輕荷殊爵晝昃猶聳夜艾方驚誠以設器瑤陛取監沖滿懸魄金波徵驗虧闕茲乃天數去盈人經好退后所以裁成萬品下所以各慎百司未有達才易貫克負永業者也且量力之誥實炯前書辭科之誨且昭昔牒況臣徒竭弱質忠貞未對猶叨令恩山岳非重故慚屬交喪頻煩表疏必謂巡崖之慊不忽氣亮之請可期不悟皇明神邈鴻獎彌深雖守丹愚競絕蠲恕今輒燿纓上序鏘珮中軒德輕施重左右生譁志盡輸謝終愧報效不任下情蕭驃騎謝甲仗入殿表臣某言臣即日被敕賜給甲仗五十人入禁儀武殿飾冠疇典局此盛恩五情銘載臣聞國之利器在祀與戎蘭錡之設實允儲方故官騎宸居羽林天部瞰城龍塞言伏鬼方臣股肱之力不足以染丹青橫草之勤寧可以鏤金石而魚服象弭一旦虛授誕錫金珪方茲為絢黃河如帶比今非賞故異寵之襲心魄共驚不世之服蒼祇同煇雖攀靈河漢駿奔明哲慚迹駭衷無情以處蕭驃騎讓豫司二州表臣某言臣傾心駐氣不蒙睿感憂讋交鏡中寐再驚中謝臣聞國曆惟燿則藩伯緝其才朝緯伊序則方牧司其度用能璿紐弗虧民教可變者也臣自少器業無聞弘大誤變燕鼎超憑吳舟託翰負組假翼要瓊質圖玄素文寫青雘爵富諸公任高群彥銓梁既失輻誚所湊雖仄影毗道苟身贊德朝徽不昭民聽具溢豈非性力知限鑒度有崖乘茲而處猶懼紊辱之恥況此以任何堪湧溢之賜且董督條興蓋非盛古至乃河襄初授或體兼上才江表廣任或功為物首臣績陋於國不勤睿朝寵集若是非所克敢終抱寸襟重露愚見伏願天鑄廣裁地靈厚載特垂蠲渥使不矜盈則藿質蓬性庶無矯奪不任匪晏之情蕭驃騎發徐州三五教州府紀綱沈攸之背慢靈極稽誅之日久矣況稱兵江漢之上圖釁廟闕之下惡熾罪盈民靈所絕朝廷以剋辰纂嚴令輿夙駕吾任先責遠義兼常慨挺刃投袂信見其時方當水斬龍蛟陸斷犀兕雖烈士銜志壯夫投概然雲羅既舒宜廣威防所統郡縣便普三五咸依舊格以赴戎麾主者飛火施行蕭驃騎上頓表臣某言伏見明詔鑾輿便親御六師臣又謬總群帥竊聞金火告燿昏明代卷雲電溉湊經綸相襲所以草昧縣㝢昭晣區宙況乃逆徒阻兵器掩西服雖蟻眾鼠竊勢必褫散然尋仞難貸原煙易滅臣受筭內楹稜威外閫按甲視夕沾襟待旦翦此凶渠庶匪曠旬但遂玉輅躬臨雲蹕親駕悚慨交心十百常憤今便嚴率所統剋此月二十六日出次戎郊故已望江源以軫歎想荊山而增厲矣進止之宜更聽敕旨不任悚企匪寧之心蕭驃騎築新亭壘埋枯骸教蕭驃騎築新亭壘埋枯骸教府州綱紀夫汝南稱慈諒由掩胔廣漢流仁實存殯朽近袤製茲塋崇堞浚塹古墟曩隧時有湮移深松茂草或致刊薙憑壙動懷巡隍增愴宜並為收改葬奠祀主局詳辨施行蕭驃騎謝被侍中慰勞表蕭驃騎謝被侍中慰勞表臣某言即日侍中祕書監臣戢至奉宣詔旨慰勞便受轂中帷練甲外壘旍麾蔽景輿徒競氣人懷秋嚴士蓄霜斷晦魂已掩氛豎未懸稽鉞佇威寢興震慨今王人臨郊皇華降庭煇燿望實將激威武戴鶡之夫迎光蹀恩投石之師攀炤竦惠楚纊越醪方茲慚潤臣忝屬閫私彌抱渥洽不任下情蕭驃騎慶平賊表臣某言狂賊沈攸之棄天犯紀毀禮滅緯外陵南畿內奰西夏稟血涵氣咸百讎憤賴皇威遐制璿圖廣馭四海競順其會如林仰綴宗稷之靈俯輯士民之效故嚴敕裁交妖鋒折首凱期既屆樂飲在晨斯乃紫曆方永蒼氓同慶臣備符寵私時深抃舞不任踴躍之情蕭驃騎解嚴輸黃鉞表臣某言逆沴電熾凶妖霧舒志夫禋天情已類社故乃馳羽江郊騖燧山甸雖藏智審其黥戮涵識判其奔沮然兵扈難輕義險宜備故膺寵無辭奉鉞不謙今元凶既殪醜徒自紊祲靄方卷郢氛已廓樂琯登肆禮衣曳朝不宜復假殊服取缺彝則輒上還王府永戢祕館蕭驃騎讓太尉增封第三表蕭驃騎讓太尉增封第三表臣某言以鉉司崇貴袞位淵嚴非德非功無忝無濫故誓魂肆請舒衷仰謁不能曲流慈炤遂乃徒洽恩獎周覽未交靈爽以懼中謝臣歷古沿圖循遠訪繪未嘗不麗選台衡妙簡槐采者也魯鄭之賢戚曹蕭之勳彥吳鄧之盛功王鍾之素業孔明之居蜀茂弘之在晉皆僉曰伊人是以處無懦色臣官逢昌世運漸時明頻煩紫渥綢繆璿命身薄施厚感厲愈深遂負機繩之託猥集衡梁之任風軌不樹徽猷罕宣無以式翦寇兆載弭姦萌致虹沴阻於上京蜺妖扇於下國寔賴藩伯鞠旅侯甸入守攙槍旬始煙祛霧卷故皇道威稜之由神緯昭昌之效臣豈有探敻察幽之智攻城野戰之力哉今迹無小功事貽大賞愧寤終朝慚夢流夜咨此庸弱何以任忝伏惟淮泗猶梗趙魏未賓中原久蕪神州方翳思樂盛猷願厲聲頌將陪雲驂以北守扈朝服以濟師乃為少雪庸誠微謝天眷耳寧容遽竊茂爵輕頒鴻名者乎伏願聖渥遐覃賜以矜宥霈焉垂仁穆然惠德血祈旦亮慊志夕滿雖蹈疪戾猶深抃躍蕭驃騎讓太尉增封表蕭驃騎讓太尉增封表臣某言撰心求私精衷請亮情不感神理無動天詔飾既降辭表是絕朱紱方臻金鉉未宥魄慮再馳詵然改席臣局志久戰淺概已領具煩寸管備黷尺史曠旬浹景祈指遂宜猶謂設品分職實以仰銓璧緯列寵縣榮故乃俯酌瑤陛迹聯盈缺道協興降上睿所以僉舉前英所以詳能今若第隨私貴爵與私富紊蕩邦經斷折民紀豈可還風中葉逖聽遐代者也臣才乏往賢績謝古烈妖風孽火將炎天地幸郊甸或靜江山以閟文軒華劍既榮既峻侯封桂食又盈又滿祿高誚厚任重責深弱節兼誠誓思不淺伏願隆慈特垂明愍臣奉國猶家慮公若私秉軸之鈞心希在治不任懇懇之情蕭驃騎讓油幢表臣某言奉詔賜車一乘竊以國容方穆旗章式序朝禮永清儀服咸貫故象革鞬鑣尚炯明圖朱箱玄蓋猶炤漢篆皆旌羽勿差功庸匪濫臣忝爵山重蒙榮海深襲恩祗冊已慚初筮浮祿素位方疚心路鑒古以惕巡世罔然不宜假文丹幰空飾皁轖仰思至道俯恤物僣伏願聖遠特停華渥書愚上請追深累懼不任下情
