body:
  text: 卷六始安王拜征虜將軍丹陽尹章既耀軒禮涵蕤龔恩爽泗靦默中謝臣少識猶晦哀辛方襲藉以育采上霄摶華中漢飲惠延光偭爵假息不悟瑤離降映繩河低文遂翊言關禁徙第京部進憲蒙淺塵紊徒盈還迷懅悚風製罔樹循伏憂欷滅慮燋衷不勝荷佩之情始安王拜征虜將軍南兗州刺史章絢服騰照懋冊凝芬夤對迷墜慚泣交集中謝臣職右南陽謝蒲鞭之政任重臨淄無遣獄之化自分金帝關參風尹訟璧緯裁復圭露詎淹不悟旻靈拂采霄景汰色復交書河楚置傳江吳環章清潤旗文肅路寵艷內維榮炫外圉方梗名慮有陋莩識沖生靦氣安以輸謝不勝荒震屏營之情建平王讓右將軍荊州刺史表茂寵乃臨炫奪彝典巡恩鏡飾攪情震慮中謝臣聞該秩詔序匪賢莫能孚其職端維裂陝非功無或濫其選所以輪鞅國典締結民紐五威咸平四精或訓者也臣踐行迷方試業敝緒徒以綴采宗莩承渥帝席執圭戴筆函荷出內至乃曳組河縣蔑馴羽之化鳴環京轂謝批鱗之政聲績兩無風化雙缺而龜紐未剔璽書頻降復改冊湘區分瑞衡服競無賈琮交部之廉終乏郭伋并壤之信固以誼沓民明湫隘身諷不悟皇靈再輝河海重渥遂踰恆采妄賁異等荊門務要方城任積水交沅澧山通岷峨襟帶百縣縈抱七州上德懋勳堪居斯地寧臣膠固所宜膺荷是以燋薄魂色驚迫心影謹刷睿情置露弱志伏願陛下停旒弛琪暫照瑣曲則鑄才式弘練物惟遠王度既清蒙識以泰不勝慚懅屏營之情建平王拜右衛將軍荊州刺史章圭冊停徽車旗寫曜襲禮炫衷迎恩震色中謝臣聞爵以能委命以績降亦有玄雲結吹褒成燻之厚朱箱纍轍崇試宰之高而臣紐組頒守要玉備政績廢江區聲隘河部浮榮曠年叨光賒日諒以具察輿歌取鏡民誚不悟皇德至凝亭物帷幄復使承官楚封祗秩漳土任班河冀事亞崤陝橫術輻輳殷氓訟積寧曰明哲疇克勝寄雖瀝丹局終懼蒙咎不任銘戴匪處之情建平王散五刑教建平王散五刑教府州國紀綱吾謬紲朝組乃班恩命重渥華藩踐寵懋甸永言政惠良攪情寐況舊楚地曠前郢氓殷水帶枉渚山匝魯陽自頃田邑榛故封井萊蕪財賦方屈犴獄實繁思所以厚風釐俗變瑟改調自五歲刑已下未連臺者一皆原遣文武彈坐亦悉復職主局依舊施散薄紓此懷建平王謝賜石硯等啓臣言奉敕賜石硯及法書五卷天旨又以臣書小進更使勤習敬閲籀篆側觀硯功張衛慚奇金瓊羞麗臣夙乏翰能素謝篇伎空賁恩輝徒隆慈飾方停煙墨永砥學玩仰結聖造伏銘私荷不任下情建平王謝玉環刀等啓奉敕賜玉環刀等五種珍器贐伏蒙猥降飾軼采朱跨影懸魄崑岡歸琛關山慚寶謹襲緹素以充握睇垂光既深銘佩更積不任下情建平王慶明帝疾和禮上表臣聞慶動至玄則昌衢敦序教孚上雲則紫㝢交泰故祁寒溽暑無以變其和沴火凝陰不能徙其氣伏惟陛下至德遠稜實天縱聖仁鑄蒼嶽道括寰海故丹陵之君款金泥而謝賢媯墟之后眷龍圖而慚德頌聲蔽逵歌思匝道而望景暫虧輪光少曖玉櫺違和金幌輟念百祠未遑四嶽匪處吉蠲為慶神御方休瑞廣文齡祥深武日具惟涵教倡愈兼薦臣班戚奉慈實自慶舞不勝悅豫之情建平王慶安城王拜封表麗采繩河映萼璿圃淑問夙孚令儀早晣撰告候辰昭膺輝序國維富禮皇塗凝衛具生屬慶懷識戴躍臣涵悅楚邊魂馳關闕不任下情建平王聘隱逸教建平王聘隱逸教府州國紀綱夫媯夏已沒大道不行雖周惠之富猶有魚潭之士漢教之隆亦見棲山之夫迹絶雲氣意負青天皆待絳螭驤首翠虬來儀是以遺風獨扇百代餘烈激厲後生斯乃王教之助古人之意焉吾稅駕舊楚憩乘汀潭挹於陵之操想漢陰之高而山川遐久流風無沫養志數人並未徵采善操將棄良用慨然宜速詳舊禮各遣纁招庶暢此幽襟以旌蓬蓽藝文類聚三十七建平王慶改號啓竊以皇衢永謐則玉曆惟禎國慶方夷則繩澤式茂故五鳳協年甘露應號況今道潤衍溢頌祉載繁嘉生蠲慶風雲瑞節既覯昭晨方鑄昌化延守一隅無以自屆不勝荒情建平王慶少帝登祚章上書皇帝陛下伏承肇嗣天震雲飛璿極戎夏歸服民靈以戴中謝臣聞黃旗紆藻瑞益於姬帝紫雲垂蓋效異於劉后實乃深賜天衷廣映祇迹伏惟陛下騫英駕聖涵靈縱睿矩心明裁繩道哲時遙裔雒符雜沓河紀是以膺符寶宮輯命珍殿誼洗雲密德徽媯夏濬發鴻原長禘偉業方絢聲金圖騰華玉曆波掩下氓炎躔上漢臣沿莩締寵誠兼親屏禮升之日守官楚甸不獲勉躬儲外奉㪜行間魂泣江郊心泫京國不任悲仰哽慰之情建平王慶王太后正位章建平王答慶王太后正位章上書王太后殿下伏承以令日淑辰曾光樞景慶芬祗外禮蔚寰中中謝臣聞道懋第昌業廣祉盛藻秩攸臻憲章斯飾伏惟殿下柔明固天夙資龔懿芬蕙翔聲端簡散譽冠采摯妊騰耀徽姒丹陵蘊德玄丘棲聖煙熅國牒衍溢民聽涵道席教且詠且洽臣忝任蕃圉無由隨例闕廷不勝荒情建平王慶江皇后正位章建平王慶江皇后正位章上書皇后殿下伏承以嘉月蕙時膺曜宸正翠珩照品褕組在飾休遍函夏譽殷靈昧中謝伏惟殿下嶽曜靜德式懷謙順升降圖傳左右詩史夙鍾茂資早摛芳訓故以騰馥祕閨寫問中帷今靈緯載升崇正輝典衍教紫庭麗軌華屋聲激綺組風偃家邦黎玄湊仁雲祗宅慶遠邇有聞莫不傾渥臣限外任無由恭列軒屏不勝荒情藝文類聚十五初學記十建平王太妃周氏行狀建平王太妃周氏行狀竊聞侯服之譽非黃冠能敷玉食之問寧皂衣所述諒畏褒虛美於君后被空名於鼎貴然有漢臣誄行晉史書德者亦云實而已焉伏見國太妃稟靈惟嶽集慶自遠世擅淮汝族冠疇代故以載曜聲書式炳縢牒矣太妃誕離明之正和涵雲露之中氣凝采齠歲賁章笄年若乃彤管女圖之學纂組綺縞之工升降處謙之儀柔靜居順之節莫不中道若性不嚴而成故譽滿闈閾聲聞軒殿以元嘉某年歸于故司徒宣簡王既而第高恆倫秩踰外品青軒華轂用光國輝素壁丹墀實隆家貴具惟姻娣靡不式贍而居尊以簡訓卑以弘躬謹蘭閨身撝椒第若衛娥之炯行樊嬴之英操方之蔑如也大明二年宣簡王薨太妃藉悲用禮撫孤用慈柔懿之德愈彰肅敬之問日被雖文伯之母言不踰閾莒相之主行存乎勤無以過也大明某年拜建平王太妃是時今王春秋方富德業未隆藉茲金響終能玉播故綺襦出宰弱冠升朝者亦太妃劬勞之訓也謂天蓋高降年不永以太豫元年二月三日薨于荊州之內寢凡厥遠邇以哀以歎今祖行有期泉穸無遠素旗望路綵旌思歸所以垂宣徽容髣佛金石者謹詳牒行狀具以申言藝文類聚十五建平王讓鎮南徐州刺史啓臣言臣誓惟殃釁頻瀉四折慊慊狂愚冀蒙哀弔而聖旨懸嚴便賜斷表神乖意失音影何地吞悲茹號情膽載絶臣荒昧神氣爰自幼稟分踰鼎貴秩高外州臣乏素能或所不任況在憂年必取黜辱特為開非常之恩借權製之義紊禮滅經實翦治本臣又能身祈命請一感天地躑躅表啓心容已靦猶疑大道之行墨縗不興孝治天下通喪獲遂陛下覆被仁明品物無漏豈於微臣獨不蠲鑒燋鯁在躬輒復塵觸伏願暫輟聽覽少憐苫草則臣死之日猶生之年臨啓恍惚魂識無主不勝殞越怵息之心建平王之南徐州刺史辭闕表臣過承寵靈閔默假日徒抱皇慈無充橫草而品第乃崇軒服逾峻顧茲靦躬彌覯荒昧今便奉官外甸卷迹徐山託慕宸嚴載惟感戀哀疾不獲詣闕不任窮鯁之情
